<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Age of Legends</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  background:#000;touch-action:none;user-select:none;
  width:100vw;height:100dvh;
  font-family:'Cinzel',serif;
  padding-top:0;
}

#gc{position:fixed;top:0;left:0;display:block;z-index:1;}
#hud{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10;}

/* ══════════════════════════════════════════════════
   TOP BAR — AoM style, full height with badge
   ══════════════════════════════════════════════════ */
#topBar{
  position:absolute;top:0;left:0;right:0;height:var(--topH,56px);
  background:linear-gradient(180deg,#1a0d00 0%,#3c1e00 30%,#2a1400 80%,#1a0d00 100%);
  border-bottom:3px solid #8c6010;
  display:flex;align-items:center;padding:0 8px;gap:4px;
  pointer-events:auto;
  box-shadow:0 4px 24px rgba(0,0,0,.95),inset 0 1px 0 rgba(255,200,80,.15);
  overflow:visible;z-index:20;
}
.res{
  display:flex;align-items:center;gap:4px;
  background:linear-gradient(180deg,rgba(30,15,0,.96),rgba(8,4,0,.98));
  border:1px solid rgba(160,100,0,.9);border-radius:3px;
  padding:3px 8px 3px 5px;flex-shrink:0;
  box-shadow:inset 0 1px 0 rgba(255,190,60,.12),inset 0 -1px 0 rgba(0,0,0,.5),0 2px 6px rgba(0,0,0,.6);
}
.resIcon{width:20px;height:20px;flex-shrink:0;}
.resVal{
  color:#ffe060;font-size:14px;font-weight:700;min-width:32px;
  text-shadow:0 0 12px rgba(255,210,0,.7),0 1px 2px rgba(0,0,0,.9);
}
.resSep{width:1px;height:24px;background:linear-gradient(180deg,transparent,#7a5010 40%,#7a5010 60%,transparent);flex-shrink:0;margin:0 1px;}

/* Age medallion — sits within top bar, no clip */
#ageBadge{
  position:absolute;left:50%;transform:translateX(-50%);top:50%;margin-top:-34px;
  width:68px;height:68px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#643800 0%,#2e1800 50%,#120800 100%);
  border:4px solid #d4ac40;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  box-shadow:0 0 28px rgba(220,155,0,.6),inset 0 2px 0 rgba(255,215,80,.3),0 6px 18px rgba(0,0,0,.9),0 0 0 2px rgba(0,0,0,.5);
  z-index:30;cursor:pointer;pointer-events:auto;
}
#ageBadge::after{
  content:'';position:absolute;inset:5px;border-radius:50%;
  border:1px solid rgba(220,170,60,.25);pointer-events:none;
}
#ageBadge .ageNum{color:#ffe84a;font-size:22px;font-weight:900;line-height:1;text-shadow:0 0 16px rgba(255,220,0,.9),0 1px 3px rgba(0,0,0,.9);}
#ageBadge .ageLbl{color:#b89030;font-size:7px;letter-spacing:1.5px;line-height:1;text-shadow:0 1px 3px rgba(0,0,0,.8);}

#popDisplay{
  margin-left:auto;flex-shrink:0;
  display:flex;align-items:center;gap:4px;
  background:linear-gradient(180deg,rgba(30,15,0,.96),rgba(8,4,0,.98));
  border:1px solid rgba(140,90,0,.8);border-radius:3px;padding:3px 10px;
  color:#e0c870;font-size:12px;letter-spacing:.3px;
  box-shadow:inset 0 1px 0 rgba(255,190,60,.1),0 2px 6px rgba(0,0,0,.6);
}
#gameTimer{
  display:flex;align-items:center;
  background:linear-gradient(180deg,rgba(30,15,0,.96),rgba(8,4,0,.98));
  border:1px solid rgba(140,90,0,.8);border-radius:3px;padding:3px 10px;
  color:#c8a040;font-size:13px;font-weight:700;letter-spacing:2px;
  font-family:'Courier New',monospace;
  box-shadow:inset 0 1px 0 rgba(255,190,60,.1),0 2px 6px rgba(0,0,0,.6);
  margin-left:4px;
}

/* ══════════════════════════════════════════════════
   BOTTOM HUD  — AoM column order:
   [Info/Portrait  ~320px] [Actions  1fr] [Minimap  ~220px]
   ══════════════════════════════════════════════════ */
#bottomHUD{
  position:absolute;bottom:6px;left:0;right:0;
  height:var(--hudH,200px);
  display:grid;
  grid-template-columns:320px 1fr 220px;
  pointer-events:auto;
  background:#0e0700;
  border-top:3px solid #8c6010;
  box-shadow:0 -3px 0 #4a2c00,0 -10px 36px rgba(0,0,0,.98),inset 0 1px 0 rgba(255,180,0,.14);
  overflow:hidden;
}

/* ── LEFT: Portrait + info (AoM style) ── */
#infoPanel{
  display:flex;align-items:stretch;overflow:hidden;
  border-right:3px solid #6e4400;
  background:linear-gradient(135deg,#0e0700 0%,#1e1006 60%,#0e0700 100%);
}
#portraitWrap{
  flex-shrink:0;width:120px;
  background:linear-gradient(180deg,#0a0500,#160c04,#0a0500);
  border-right:2px solid #4e3200;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:6px 6px 4px;gap:3px;
}
#portrait{
  display:block;flex-shrink:0;
  border:3px solid #9a7020;border-radius:2px;
  background:#050300;
  box-shadow:0 0 16px rgba(0,0,0,.9),inset 0 0 8px rgba(0,0,0,.7),0 0 0 1px #2a1800;
}
#portName{
  font-size:8px;color:#b89040;letter-spacing:.3px;text-align:center;
  line-height:1.2;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  text-shadow:0 1px 2px rgba(0,0,0,.8);
  padding:0 2px;
}
#infoText{
  flex:1;min-width:0;
  padding:6px 10px 4px;
  display:flex;flex-direction:column;justify-content:flex-start;gap:3px;overflow:hidden;
}
#selName{
  color:#f8d840;font-size:13px;font-weight:900;
  text-shadow:0 0 12px rgba(240,190,0,.5),0 1px 3px rgba(0,0,0,.9);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.5px;text-transform:uppercase;line-height:1;
}
#ownerName{
  color:#6aabff;font-size:9px;letter-spacing:.3px;line-height:1;
  text-shadow:0 1px 2px rgba(0,0,0,.8);margin-bottom:1px;
}
/* AoM stat row: HP bar + stat icons */
#statRow{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;
  font-size:9px;color:#c4a458;line-height:1.4;
}
.statItem{display:flex;align-items:center;gap:2px;white-space:nowrap;}
.statIco{font-size:10px;line-height:1;}
.statVal{color:#f0d060;font-size:9px;font-weight:700;}
#hpBarWrap{display:flex;flex-direction:column;gap:2px;margin-top:2px;width:100%;}
#hpLabel{font-size:7.5px;color:#907030;letter-spacing:.8px;}
#hpOuter{
  width:100%;height:9px;
  background:#060300;border:1px solid #4a3008;border-radius:1px;overflow:hidden;
  box-shadow:inset 0 2px 5px rgba(0,0,0,.8);
}
#hpInner{height:100%;width:100%;transition:width .25s,background .25s;border-radius:1px;}
/* AoM-style attack/stat section */
#atkSection{
  display:none;flex-direction:column;gap:1px;margin-top:3px;
  border-top:1px solid #3a2200;padding-top:3px;
}
#atkLabel{font-size:7.5px;color:#c09050;letter-spacing:1px;text-transform:uppercase;}
#atkStats{display:flex;gap:8px;font-size:9px;color:#e0c070;}
.atkNum{display:flex;align-items:center;gap:2px;}
.atkIco{font-size:9px;opacity:.8;}
#selInfo{color:#c4a458;font-size:9.5px;line-height:1.5;overflow:hidden;white-space:pre-line;}

#cmdBtn{
  display:none;width:44px;height:44px;border-radius:50%;
  background:rgba(8,5,0,.9);border:2px solid #8b5a00;
  color:#f0c040;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:auto;touch-action:manipulation;cursor:pointer;
  font-family:'Cinzel',serif;flex-shrink:0;
}
#cmdBtn .ci{font-size:18px;line-height:1;}
#cmdBtn .cl{font-size:6px;letter-spacing:.5px;}
#cmdBtn.active{background:rgba(90,10,0,.95);border-color:#ff4020;color:#ff7050;}

/* ── CENTRE: Action button grid ── */
#actPanel{
  background:linear-gradient(135deg,#0c0600 0%,#1a0e06 50%,#0c0600 100%);
  border-right:3px solid #6e4400;
  padding:8px 6px;
  display:flex;flex-wrap:wrap;
  align-content:flex-start;justify-content:flex-start;
  gap:5px;overflow:hidden;
}
.aBtn{
  background:radial-gradient(circle at 38% 28%,#3a2206,#180c02);
  border:1px solid #6a4010;border-radius:4px;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#d4b070;position:relative;
  transition:border-color .1s,transform .07s;
  touch-action:manipulation;
  box-shadow:inset 0 1px 0 rgba(255,180,0,.14),0 2px 6px rgba(0,0,0,.7),inset 0 -2px 0 rgba(0,0,0,.5);
  /* size set by JS */
}
.aBtn .aBtnIco{font-size:20px;line-height:1;}
.aBtn .aBtnName{font-size:7px;color:#907830;margin-top:3px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;padding:0 2px;}
.aBtn:hover{border-color:#b87820;background:radial-gradient(circle at 38% 28%,#4e2e0c,#28140a);}
.aBtn:active{border-color:#f0d040;transform:scale(.88);}
.aCost{
  position:absolute;bottom:2px;left:0;right:0;
  font-size:6.5px;color:#f0d040;text-align:center;line-height:1;padding:0 2px;
  text-shadow:0 1px 3px rgba(0,0,0,.9);
}

/* ── RIGHT: Minimap — AoM iso diamond style ── */
#mmPanel{
  background:linear-gradient(135deg,#080400 0%,#100804 50%,#080400 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 6px 4px;gap:4px;overflow:hidden;
  box-shadow:inset 3px 0 16px rgba(0,0,0,.7);
}
#mmLabel{
  color:#c8a040;font-size:10px;font-weight:700;letter-spacing:3px;
  flex-shrink:0;
  text-shadow:0 0 10px rgba(200,150,0,.55),0 1px 2px rgba(0,0,0,.9);
}
#mmFrame{
  position:relative;flex-shrink:0;line-height:0;
  border:2px solid #a07828;
  box-shadow:0 0 0 1px #d4ac40,0 0 0 2px #3a2400,0 0 20px rgba(0,0,0,.9),inset 0 0 8px rgba(0,0,0,.6);
  /* Rotate to diamond/iso view like AoM */
  transform:rotate(45deg);
  overflow:hidden;
}
#minimap{display:block;}
/* AoM minimap has compass rose at corners — simplified N indicator */
#mmNorth{
  position:absolute;top:-18px;left:50%;transform:translateX(-50%) rotate(-45deg);
  color:#c8a040;font-size:9px;font-weight:700;letter-spacing:1px;
  text-shadow:0 0 6px rgba(200,140,0,.8),0 1px 2px rgba(0,0,0,.9);
}
#mmLegend{
  display:flex;flex-wrap:wrap;justify-content:center;
  gap:3px 8px;width:100%;flex-shrink:0;padding:2px 4px;
}
.mmDot{
  display:flex;align-items:center;gap:4px;
  font-size:9px;color:#b89840;white-space:nowrap;line-height:1.4;
  font-weight:700;letter-spacing:.2px;
}
.mmDot b{
  width:8px;height:8px;border-radius:50%;
  display:inline-block;flex-shrink:0;
  box-shadow:0 0 4px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.1);
}

/* ══════════════════════════════════════════════════
   MISC
   ══════════════════════════════════════════════════ */
#joystickWrap{
  position:fixed;right:14px;bottom:calc(var(--hudH,200px) + 20px);
  width:92px;height:92px;display:none;z-index:40;pointer-events:auto;touch-action:none;
}
#joystickBase{
  width:100%;height:100%;border-radius:50%;
  background:rgba(5,3,0,.72);border:2px solid rgba(140,90,0,.75);
  position:relative;box-shadow:0 2px 16px rgba(0,0,0,.75);
}
#joystickKnob{
  width:44%;height:44%;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(240,192,64,.95),rgba(100,60,10,.8));
  border:1.5px solid #a07020;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}
#notifs{
  position:absolute;top:54px;right:10px;
  display:flex;flex-direction:column;gap:5px;
  pointer-events:none;z-index:30;max-width:55vw;
}
.notif{
  background:linear-gradient(90deg,rgba(16,8,0,.98),rgba(30,14,0,.98));
  border:1px solid #7a5000;border-radius:3px;padding:5px 12px;
  color:#f0d060;font-size:11px;letter-spacing:.3px;
  animation:nFade 3.5s forwards;box-shadow:0 2px 12px rgba(0,0,0,.8);
}
@keyframes nFade{0%{opacity:0;transform:translateX(12px)}10%{opacity:1;transform:translateX(0)}75%{opacity:1}100%{opacity:0}}
#selBox{position:absolute;border:1px solid rgba(60,220,60,.85);background:rgba(60,220,60,.06);pointer-events:none;display:none;z-index:6;}
#tip{position:absolute;background:rgba(8,5,0,.97);border:1px solid #7a5000;border-radius:3px;padding:5px 10px;color:#c0a060;font-size:11px;pointer-events:none;display:none;z-index:25;max-width:170px;line-height:1.5;}
#tip b{color:#f0c040;display:block;margin-bottom:3px;font-size:12px;}
.tap-ring{position:fixed;pointer-events:none;z-index:50;width:40px;height:40px;margin-left:-20px;margin-top:-20px;border-radius:50%;border:2px solid rgba(80,220,80,.9);animation:tapRing .4s ease-out forwards;}
.tap-ring.red{border-color:rgba(255,70,70,.9);}
@keyframes tapRing{0%{transform:scale(.2);opacity:1}100%{transform:scale(1.7);opacity:0}}
@media(pointer:coarse){
  #joystickWrap{display:block;}
  #cmdBtn{display:flex;}
}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="hud">

  <!-- ── TOP BAR ── -->
  <div id="topBar">
    <div class="res"><canvas class="resIcon" id="icFood" width="20" height="20"></canvas><span class="resVal" id="rFood">500</span></div>
    <div class="resSep"></div>
    <div class="res"><canvas class="resIcon" id="icWood" width="20" height="20"></canvas><span class="resVal" id="rWood">500</span></div>
    <div class="resSep"></div>
    <div class="res"><canvas class="resIcon" id="icGold" width="20" height="20"></canvas><span class="resVal" id="rGold">300</span></div>
    <div class="resSep"></div>
    <div class="res"><canvas class="resIcon" id="icStone" width="20" height="20"></canvas><span class="resVal" id="rStone">200</span></div>
    <div id="ageBadge"><span class="ageNum" id="ageNum">I</span><span class="ageLbl" id="ageLbl">DARK AGE</span></div>
    <div id="popDisplay"><span class="popIcon">👤</span><span id="rPop">0</span>&thinsp;/&thinsp;<span id="rPopCap">20</span></div>
    <div id="gameTimer">00:00:00</div>
  </div>

  <!-- ── BOTTOM HUD ── -->
  <div id="bottomHUD">

    <!-- LEFT: Portrait + unit info AoM style -->
    <div id="infoPanel">
      <div id="portraitWrap">
        <canvas id="portrait" width="100" height="100"></canvas>
        <div id="portName">— SELECT —</div>
        <div id="cmdBtn"><span class="ci">⚔</span><span class="cl">CMD</span></div>
      </div>
      <div id="infoText">
        <div id="selName">No Selection</div>
        <div id="ownerName"></div>
        <div id="statRow">
          <span class="statItem"><span class="statIco">❤️</span><span class="statVal" id="statHP">—</span></span>
          <span class="statItem"><span class="statIco">⚔</span><span class="statVal" id="statAtk">—</span></span>
          <span class="statItem"><span class="statIco">🎯</span><span class="statVal" id="statRng">—</span></span>
          <span class="statItem"><span class="statIco">💨</span><span class="statVal" id="statSpd">—</span></span>
        </div>
        <div id="hpBarWrap">
          <div id="hpOuter"><div id="hpInner"></div></div>
        </div>
        <div id="atkSection">
          <div id="atkLabel">ATTACK</div>
          <div id="atkStats">
            <span class="atkNum"><span class="atkIco">⚔</span><span id="atkDmg">0</span></span>
            <span class="atkNum"><span class="atkIco">🎯</span><span id="atkRng">0</span></span>
            <span class="atkNum"><span class="atkIco">💨</span><span id="atkSpd">0</span></span>
          </div>
        </div>
        <div id="selInfo">Click a unit or building.</div>
      </div>
    </div>

    <!-- CENTRE: Action buttons -->
    <div id="actPanel"></div>

    <!-- RIGHT: Minimap -->
    <div id="mmPanel">
      <div id="mmLabel">MAP</div>
      <div id="mmFrame"><canvas id="minimap"></canvas><span id="mmNorth">N</span></div>
      <div id="mmLegend">
        <span class="mmDot"><b style="background:#44dd44"></b>Ally</span>
        <span class="mmDot"><b style="background:#ee2020"></b>Enemy</span>
        <span class="mmDot"><b style="background:#f0c040"></b>Base</span>
      </div>
    </div>

  </div><!-- /bottomHUD -->

  <div id="joystickWrap"><div id="joystickBase"><div id="joystickKnob"></div></div></div>
  <div id="notifs"></div>
  <div id="selBox"></div>
  <div id="tip"></div>
</div>

<script>
// ── Resource icons ────────────────────────────────────
(function drawIcons(){
  function ic(id,fn){const cv=document.getElementById(id);if(!cv)return;cv.width=18;cv.height=18;fn(cv.getContext('2d'));}
  ic('icFood',x=>{
    x.fillStyle='#309010';x.fillRect(8,2,2,10);
    x.strokeStyle='#e8c028';x.lineWidth=1.5;
    [[9,4,-4,-2],[9,6,-4,-2],[9,8,-4,-2],[9,4,4,2],[9,6,4,2],[9,8,4,2]].forEach(([fx,fy,tx,ty])=>{x.beginPath();x.moveTo(fx,fy);x.lineTo(fx+tx,fy+ty);x.stroke();});
    x.fillStyle='#f0d040';x.beginPath();x.arc(9,3,2,0,Math.PI*2);x.fill();
    x.fillStyle='#e8c028';x.fillRect(6,12,6,4);
  });
  ic('icWood',x=>{
    x.fillStyle='#7a4818';x.fillRect(2,8,14,5);
    x.fillStyle='#9a6028';x.beginPath();x.ellipse(2,10.5,2.5,3,0,0,Math.PI*2);x.fill();
    x.fillStyle='#b07838';x.beginPath();x.ellipse(16,10.5,2.5,3,0,0,Math.PI*2);x.fill();
    x.strokeStyle='#5a3010';x.lineWidth=1;x.strokeRect(2,8,14,5);
    x.fillStyle='#7a4818';x.fillRect(3,4,12,5);
    x.fillStyle='#9a6028';x.beginPath();x.ellipse(3,6.5,2,2.5,0,0,Math.PI*2);x.fill();
  });
  ic('icGold',x=>{
    x.fillStyle='#c89010';x.beginPath();x.arc(9,9,7,0,Math.PI*2);x.fill();
    x.fillStyle='#f0c030';x.beginPath();x.arc(9,9,5.5,0,Math.PI*2);x.fill();
    x.fillStyle='#d0a020';x.beginPath();x.arc(9,9,3,0,Math.PI*2);x.fill();
    x.fillStyle='#f8e060';x.beginPath();x.arc(7,7,1.5,0,Math.PI*2);x.fill();
  });
  ic('icStone',x=>{
    x.fillStyle='#6a6858';x.beginPath();x.ellipse(9,10,7.5,5.5,0,0,Math.PI*2);x.fill();
    x.fillStyle='#9a9888';x.beginPath();x.ellipse(7,8,5,3.5,.2,0,Math.PI*2);x.fill();
    x.fillStyle='rgba(255,255,255,.18)';x.beginPath();x.ellipse(5.5,7,2,1.5,0,0,Math.PI*2);x.fill();
  });
})();

// ── Core game state ───────────────────────────────────
const G={
  res:{food:500,wood:500,gold:300,stone:200},
  pop:0,popCap:20,age:0,
  ages:['Dark Age','Archaic Age','Classical Age','Heroic Age'],
  tick:0,cam:{x:200,y:150},
  MW:4800,MH:3600,
  sel:[],ents:[],nid:1,
  drag:false,ds:{x:0,y:0},de:{x:0,y:0},
  bmode:null,over:false,win:false,
  playerAttacked:false,
  spawnTimer:0,phase:0,
  GRACE:99999,
  startTime:Date.now(),
};
const TILE=40,COLS=Math.ceil(G.MW/TILE),ROWS=Math.ceil(G.MH/TILE);
// ── Isometric projection ──────────────────────────────
// ITW/ITH: screen pixel size of one iso diamond (2:1 ratio, AoE2 style)
const ITW=80, ITH=40;
// World tile (c,r) → iso screen pixel center (before camera)
function tileToIso(c,r){return{x:(c-r)*(ITW/2),y:(c+r)*(ITH/2)};}
// World pixel coords → iso screen pixel (for entities)
function worldToIso(wx,wy){const c=wx/TILE,r=wy/TILE;return{x:(c-r)*(ITW/2),y:(c+r)*(ITH/2)};}
// Iso screen pixel → world pixel (for mouse picking)
function isoToWorld(sx,sy){
  const c=(sx/(ITW/2)+sy/(ITH/2))/2;
  const r=(sy/(ITH/2)-sx/(ITW/2))/2;
  return{x:c*TILE,y:r*TILE};
}
const terrain=[],RMAP=[];

// ── Canvas / context ──────────────────────────────────
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const mmCanvas=document.getElementById('minimap');
const mctx=mmCanvas.getContext('2d');

// ── Layout system ─────────────────────────────────────
const L={topH:56,hudH:200,gameH:0,W:0,H:0,mmSize:100,mmW:100,actW:0,portSize:100,btnSize:44,actCols:4};
function layoutHUD(){
  L.W=window.innerWidth; L.H=window.innerHeight;
  L.topH=56; L.hudH=200;
  L.gameH=L.H-L.topH-L.hudH-6;
  canvas.width=L.W; canvas.height=L.gameH;
  canvas.style.top=L.topH+'px';
  document.documentElement.style.setProperty('--topH',L.topH+'px');
  document.documentElement.style.setProperty('--hudH',L.hudH+'px');
  // Minimap: right panel 220px, rotated 45deg so we need square smaller than available space
  // Available: 220px wide, ~200px tall minus label(20)+legend(20)+gaps = ~140px → use 90px square (looks bigger when rotated 45deg → 127px diagonal)
  const mmAvail=Math.min(L.hudH-50, 220-28);
  L.mmSize=Math.max(60,Math.min(90,mmAvail));
  const mm=document.getElementById('minimap');
  if(mm){mm.width=L.mmSize;mm.height=L.mmSize;}
  // Portrait
  L.portSize=Math.min(100, L.hudH - 36);
  const port=document.getElementById('portrait');
  if(port){port.width=L.portSize;port.height=L.portSize;}
  // Button sizing: centre panel = total - 320 - 220 = dynamic
  const actW=Math.max(100, L.W-320-220);
  L.btnSize=Math.floor((actW - 12 - 15) / 4);
  L.actCols=4;
  // Centre camera on player TC
  const tc=G.ents.find(e=>e.bld&&e.type==='tc'&&!e.enemy&&!e.dead);
  if(tc){
    const iso=worldToIso(tc.x,tc.y);
    G.cam.x=iso.x - L.W/2;
    G.cam.y=iso.y - L.gameH/2;
  }
}

// ── Screen ↔ world coords (iso-aware) ────────────────
// sx,sy = page pixel coords (clientX/Y). Canvas starts at L.topH in page space.
function screenToWorld(sx,sy){
  return isoToWorld(sx+G.cam.x, (sy-L.topH)+G.cam.y);
}
function worldToScreen(wx,wy){
  const iso=worldToIso(wx,wy);
  return{x:iso.x-G.cam.x, y:iso.y-G.cam.y+L.topH};
}

// ── Drawing helpers ───────────────────────────────────
function rand(a,b){return a+Math.random()*(b-a);}
function cl(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function dist(a,b){const dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy);}
function poly(pts,c){
  ctx.fillStyle=c; ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath(); ctx.fill();
}
// Unit scale — makes units larger and easier to see
const UNIT_SCALE=1.7;

// ── Iso terrain rendering ─────────────────────────────
// Two-pass rendering to prevent objects clipping into ground:
//   Pass 1: drawTileSides  — the thick bottom edge faces
//   Pass 2: drawTileTop    — the diamond surface + surface detail
// Objects are drawn between pass 1 and pass 2 is NOT correct —
// instead: Pass 1 all sides, Pass 2 all tops, Pass 3 all objects.
// This means objects always render above everything ground-related.
const SIDE_H=8; // pixel height of side faces

const TPAL={
  water:{
    top:['#2264b8','#2060b0','#2468bc','#1e5cac','#2266b4','#1e60ae','#2266b8','#206ab4'],
    L:'#1a4e9a', R:'#1a4e9a'
  },
  shallow:{
    top:['#3a98cc','#389acc','#3c9ccc','#3896c8','#3a9cce','#389acc','#3e9ece','#3a98cc'],
    L:'#2878a8', R:'#2878a8'
  },
  sand:{
    top:['#caa84e','#c8a64c','#ccaa50','#c8a44c','#caa850','#ccaa52','#c8a44e','#caaa50'],
    L:'#9a7828', R:'#7e6018'
  },
  grass:{
    top:['#4e8e26','#4c8c24','#508e28','#4a8a22','#4e8c26','#509028','#4c8c22','#4e9026'],
    L:'#2e5c10', R:'#224808'
  },
  grass2:{
    top:['#407018','#3e6e16','#427216','#3c6c14','#407018','#427218','#3e6e14','#406e18'],
    L:'#1e4208', R:'#183404'
  },
  hill:{
    top:['#948a64','#928862','#968c66','#908660','#948a64','#968c64','#908660','#948864'],
    L:'#5a5030', R:'#484020'
  },
  mtn:{
    top:['#747268','#727066','#767470','#706e64','#747268','#767468','#726e64','#747068'],
    L:'#484640', R:'#38362e'
  },
  path:{
    top:['#c4aa78','#c2a876','#c6ac7a','#c2a676','#c4aa78','#c6aa78','#c2a676','#c4ac78'],
    L:'#7a6632', R:'#62501e'
  },
};

// Helper: tile iso center
function tileCXY(c,r){ return {cx:(c-r)*(ITW/2), cy:(c+r)*(ITH/2)}; }

function drawTileSides(c,r){
  const t=(terrain[r]&&terrain[r][c])||'grass';
  if(t==='water'||t==='shallow') return; // no side faces for water
  const pal=TPAL[t]||TPAL.grass;
  const {cx,cy}=tileCXY(c,r);
  const hw=ITW/2, hh=ITH/2;
  const sH=t==='hill'?SIDE_H*1.8:t==='mtn'?SIDE_H*2.4:SIDE_H;

  // Left side (SW face)
  ctx.fillStyle=pal.L;
  ctx.beginPath();
  ctx.moveTo(cx-hw, cy);
  ctx.lineTo(cx,    cy+hh);
  ctx.lineTo(cx,    cy+hh+sH);
  ctx.lineTo(cx-hw, cy+sH);
  ctx.closePath(); ctx.fill();

  // Right side (SE face)
  ctx.fillStyle=pal.R;
  ctx.beginPath();
  ctx.moveTo(cx,    cy+hh);
  ctx.lineTo(cx+hw, cy);
  ctx.lineTo(cx+hw, cy+sH);
  ctx.lineTo(cx,    cy+hh+sH);
  ctx.closePath(); ctx.fill();
}

function drawTileTop(c,r){
  const t=(terrain[r]&&terrain[r][c])||'grass';
  const pal=TPAL[t]||TPAL.grass;
  const h=(c*73+r*37+c*r*3)%8;
  const {cx,cy}=tileCXY(c,r);
  const hw=ITW/2, hh=ITH/2;
  const topCol=pal.top[h];

  if(t==='water'){
    const wave=Math.sin(G.tick*.025+c*.5+r*.4)*.5+.5;
    // Deep water base
    ctx.fillStyle=topCol;
    ctx.beginPath();
    ctx.moveTo(cx,cy-hh); ctx.lineTo(cx+hw,cy); ctx.lineTo(cx,cy+hh); ctx.lineTo(cx-hw,cy);
    ctx.closePath(); ctx.fill();
    // Wave shimmer
    if(wave>.5){
      ctx.fillStyle=`rgba(100,180,240,${.06+wave*.06})`;
      ctx.beginPath();
      ctx.moveTo(cx,cy-hh); ctx.lineTo(cx+hw,cy); ctx.lineTo(cx,cy+hh); ctx.lineTo(cx-hw,cy);
      ctx.closePath(); ctx.fill();
    }
    // Foam lines on shallow edges
    const ns=[terrain[r-1]&&terrain[r-1][c],terrain[r+1]&&terrain[r+1][c],terrain[r]&&terrain[r][c-1],terrain[r]&&terrain[r][c+1]];
    const hasShore=ns.some(n=>n&&n!=='water'&&n!=='shallow');
    if(hasShore&&wave>.45){
      ctx.strokeStyle=`rgba(200,235,255,${.22+wave*.12})`; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(cx-hw*.5,cy-wave*2); ctx.lineTo(cx+hw*.4,cy-wave*2); ctx.stroke();
    }
    return;
  }

  // Top diamond
  ctx.fillStyle=topCol;
  ctx.beginPath();
  ctx.moveTo(cx,cy-hh); ctx.lineTo(cx+hw,cy); ctx.lineTo(cx,cy+hh); ctx.lineTo(cx-hw,cy);
  ctx.closePath(); ctx.fill();

  // Surface detail
  if(t==='grass'||t==='grass2'){
    if(h<2){
      ctx.fillStyle='rgba(0,20,0,.08)';
      ctx.beginPath();
      ctx.moveTo(cx+hw*.1,cy-hh*.3); ctx.lineTo(cx+hw*.7,cy+hh*.1);
      ctx.lineTo(cx+hw*.3,cy+hh*.5); ctx.lineTo(cx-hw*.1,cy+hh*.1);
      ctx.closePath(); ctx.fill();
    }
    if(h===3){
      ctx.fillStyle='rgba(30,70,10,.32)';
      ctx.fillRect(cx-3,cy-2,1.5,5); ctx.fillRect(cx+5,cy,1.5,4); ctx.fillRect(cx-8,cy+2,1.5,4);
    }
  }
  if(t==='sand'){
    if(h===1||h===4){
      ctx.fillStyle='rgba(120,90,20,.28)';
      ctx.beginPath(); ctx.arc(cx+hw*.3,cy,2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx-hw*.2,cy+hh*.3,1.5,0,Math.PI*2); ctx.fill();
    }
  }
  if(t==='path'){
    ctx.strokeStyle='rgba(0,0,0,.13)'; ctx.lineWidth=.7;
    ctx.beginPath(); ctx.moveTo(cx-hw*.5,cy-hh*.1); ctx.lineTo(cx+hw*.5,cy+hh*.1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-hh*.7); ctx.lineTo(cx,cy+hh*.6); ctx.stroke();
  }
  if(t==='hill'){
    ctx.strokeStyle='rgba(0,0,0,.09)'; ctx.lineWidth=.8;
    ctx.beginPath(); ctx.moveTo(cx-hw*.1,cy-hh*.4); ctx.lineTo(cx+hw*.3,cy+hh*.1); ctx.stroke();
  }
  if(t==='mtn'){
    ctx.fillStyle='rgba(230,240,255,.12)';
    ctx.beginPath();
    ctx.moveTo(cx-hw*.3,cy-hh*.2); ctx.lineTo(cx,cy-hh); ctx.lineTo(cx+hw*.3,cy-hh*.2);
    ctx.closePath(); ctx.fill();
  }
  if(t==='shallow'){
    ctx.fillStyle='rgba(180,230,255,.09)';
    ctx.beginPath();
    ctx.moveTo(cx,cy-hh); ctx.lineTo(cx+hw,cy); ctx.lineTo(cx,cy+hh); ctx.lineTo(cx-hw,cy);
    ctx.closePath(); ctx.fill();
  }
}

// Grass tufts (decorative, ground level) — populated after genTerrain()
const GTUFT=[];
function genTufts(){
  for(let i=0;i<1200;i++){
    const x=rand(0,G.MW), y=rand(0,G.MH);
    const col=Math.floor(x/TILE), row=Math.floor(y/TILE);
    const t=terrain[row]&&terrain[row][col];
    if(t==='grass'||t==='sand') GTUFT.push({x,y,s:rand(.6,1.2)});
  }
}

// ── Resource sprites ──────────────────────────────────

function drawTree(r,sx,sy){
  const p=r.hp/r.mhp, sc=Math.max(.15,p);
  const wb=Math.sin(G.tick*.025+r.wb)*2.5*sc;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath(); ctx.ellipse(sx+6,sy+8,18*sc,7*sc,.2,0,Math.PI*2); ctx.fill();
  // Trunk
  ctx.fillStyle='#4a2e10'; ctx.fillRect(sx-4,sy-2,8,18);
  ctx.fillStyle='#3a2008'; ctx.fillRect(sx-4,sy-2,3,18);
  ctx.fillStyle='#3e2808';
  ctx.beginPath(); ctx.ellipse(sx,sy+15,9,4,0,0,Math.PI*2); ctx.fill();
  // Layered canopy
  const d=1-p;
  const ca=`hsl(${112+d*18},${58+p*28}%,${17+p*10}%)`;
  const cb=`hsl(${116+d*14},${64+p*24}%,${23+p*9}%)`;
  const cc=`hsl(${120+d*10},${70+p*20}%,${30+p*8}%)`;
  const cd=`hsl(${124+d*6},${74+p*16}%,${39+p*6}%)`;
  ctx.fillStyle=ca; ctx.beginPath(); ctx.ellipse(sx-2+wb,sy-8,20*sc,15*sc,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=cb; ctx.beginPath(); ctx.ellipse(sx+wb*.5,sy-13,18*sc,13*sc,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=cc; ctx.beginPath(); ctx.ellipse(sx-5+wb*.3,sy-18,14*sc,10*sc,-.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=cd; ctx.beginPath(); ctx.ellipse(sx+3+wb*.1,sy-22,10*sc,7*sc,.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=`rgba(150,240,70,${.1*p})`;
  ctx.beginPath(); ctx.ellipse(sx-4+wb*.1,sy-22,6*sc,4*sc,.2,0,Math.PI*2); ctx.fill();
  if(p<1){
    ctx.fillStyle='rgba(0,0,0,.7)'; ctx.fillRect(sx-14,sy-36,28,5);
    ctx.fillStyle='#3a8820'; ctx.fillRect(sx-14,sy-36,28*p,5);
  }
}

function drawGold(r,sx,sy){
  const sp=Math.sin(G.tick*.09+r.id)*.3+.7;
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath(); ctx.ellipse(sx+3,sy+8,22,8,.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#5a4e32';
  ctx.beginPath(); ctx.ellipse(sx,sy+2,22,12,0,0,Math.PI*2); ctx.fill();
  [[-8,-8,.35,12,9],[0,-12,-.05,10,8],[8,-6,-.28,11,8],[2,-14,.18,7,6]].forEach(([ox,oy,a,rw,rh])=>{
    ctx.fillStyle='#b88010'; ctx.beginPath(); ctx.ellipse(sx+ox,sy+oy,rw,rh,a,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#e8c020'; ctx.beginPath(); ctx.ellipse(sx+ox-rw*.25,sy+oy-rh*.3,rw*.55,rh*.55,a,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle=`rgba(255,235,70,${.65*sp})`;
  ctx.beginPath(); ctx.arc(sx-6,sy-10,4,0,Math.PI*2); ctx.fill();
  if(r.hp<r.mhp){
    ctx.fillStyle='rgba(0,0,0,.7)'; ctx.fillRect(sx-16,sy+16,32,5);
    ctx.fillStyle='#d8a010'; ctx.fillRect(sx-16,sy+16,32*(r.hp/r.mhp),5);
  }
}

function drawStone(r,sx,sy){
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath(); ctx.ellipse(sx+3,sy+8,22,8,.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#585450';
  ctx.beginPath(); ctx.ellipse(sx,sy,22,15,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#9a9888';
  ctx.beginPath(); ctx.ellipse(sx-3,sy-4,14,10,.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#b8b4a0';
  ctx.beginPath(); ctx.ellipse(sx+8,sy-2,10,7,-.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.14)';
  ctx.beginPath(); ctx.ellipse(sx-5,sy-6,4.5,3,.3,0,Math.PI*2); ctx.fill();
  if(r.hp<r.mhp){
    ctx.fillStyle='rgba(0,0,0,.7)'; ctx.fillRect(sx-16,sy+18,32,5);
    ctx.fillStyle='#a0a088'; ctx.fillRect(sx-16,sy+18,32*(r.hp/r.mhp),5);
  }
}

function drawDeer(r,sx,sy){
  const mv=Math.abs(r.vx)+Math.abs(r.vy)>.1;
  const sw=mv?Math.sin(G.tick*.07+r.id)*4:0;
  ctx.fillStyle='rgba(0,0,0,.18)';
  ctx.beginPath(); ctx.ellipse(sx,sy+14,13,4,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#a05820'; ctx.lineWidth=2.5;
  [[sx-7,4],[sx-2,5],[sx+2,5],[sx+7,4]].forEach(([lx,oy],i)=>{
    ctx.beginPath(); ctx.moveTo(lx,sy+oy); ctx.lineTo(lx+(sw*(i<2?1:-1)),sy+14); ctx.stroke();
  });
  ctx.fillStyle='#c87038'; ctx.beginPath(); ctx.ellipse(sx,sy+3,12,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#d88848'; ctx.beginPath(); ctx.ellipse(sx-3,sy+2,8,6,-.1,0,Math.PI*2); ctx.fill();
  const ha=r.ang, hx=sx+Math.cos(ha)*13, hy=sy+Math.sin(ha)*13-2;
  ctx.fillStyle='#c07038'; ctx.beginPath(); ctx.ellipse(hx,hy,6,4.5,ha,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#4a2808'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(hx,hy-3); ctx.lineTo(hx+4,hy-11); ctx.lineTo(hx+8,hy-9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx,hy-3); ctx.lineTo(hx-4,hy-11); ctx.lineTo(hx-8,hy-9); ctx.stroke();
}

function drawBerry(r,sx,sy){
  const sc=r.hp/r.mhp;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.18)';
  ctx.beginPath(); ctx.ellipse(sx+3,sy+8,14*sc,5*sc,.1,0,Math.PI*2); ctx.fill();
  // Stem/branches
  ctx.strokeStyle='#3a5a18'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(sx,sy+6); ctx.lineTo(sx,sy-8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx-8,sy-5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx,sy-3); ctx.lineTo(sx+7,sy-8); ctx.stroke();
  // Leaves
  ctx.fillStyle='#3a7020'; ctx.beginPath(); ctx.ellipse(sx,sy-10,8*sc,5*sc,-.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4a8828'; ctx.beginPath(); ctx.ellipse(sx-7,sy-6,6*sc,4*sc,.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#428020'; ctx.beginPath(); ctx.ellipse(sx+6,sy-9,6*sc,4*sc,-.3,0,Math.PI*2); ctx.fill();
  // Berries
  if(sc>.3){
    const b=G.tick*.04+r.wb;
    [[sx-5,sy-3],[sx+3,sy-5],[sx-2,sy-12],[sx+8,sy-6],[sx-9,sy-8]].forEach(([bx,by],i)=>{
      ctx.fillStyle=`hsl(${340+i*8},85%,${42+Math.sin(b+i)*.5+.5}%)`;
      ctx.beginPath(); ctx.arc(bx,by,3*sc,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.35)';
      ctx.beginPath(); ctx.arc(bx-1,by-1,1*sc,0,Math.PI*2); ctx.fill();
    });
  }
}

function drawFish(r,sx,sy){
  const sw=Math.sin(G.tick*.08+r.wb)*2.5;
  const a=r.ang;
  ctx.save(); ctx.translate(sx,sy); ctx.rotate(a);
  // Body
  ctx.fillStyle='#4898c8'; ctx.beginPath(); ctx.ellipse(0,0,10,5,.0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#5abcd8'; ctx.beginPath(); ctx.ellipse(-2,-1,6,3,.0,0,Math.PI*2); ctx.fill();
  // Tail
  ctx.fillStyle='#3878a8';
  ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(14+sw,4); ctx.lineTo(14+sw,-4); ctx.closePath(); ctx.fill();
  // Eye
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-6,0,1.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.6)'; ctx.beginPath(); ctx.arc(-6.5,-.5,.6,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // Ripple
  ctx.strokeStyle='rgba(140,200,240,.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.ellipse(sx,sy+4,12,4,0,0,Math.PI*2); ctx.stroke();
}
function drawVillager(e,sx,sy){
  const t=G.tick*.16, walk=e.mv?Math.sin(t)*3.5:0;
  const gath=e.task==='gath'||e.task==='build';
  const chop=gath?Math.sin(G.tick*.22)*5:0;
  ctx.fillStyle='rgba(0,0,0,.2)'; ctx.beginPath(); ctx.ellipse(sx,sy+15,9,3.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2e1808'; ctx.fillRect(sx-5+walk,sy+9,5,7); ctx.fillRect(sx+1-walk,sy+9,5,7);
  ctx.fillStyle='#503818'; ctx.fillRect(sx-4+walk*.5,sy+3,4,8); ctx.fillRect(sx+1-walk*.5,sy+3,4,8);
  poly([[sx-7,sy-3],[sx+7,sy-3],[sx+6,sy+5],[sx-6,sy+5]],'#9a6e3a');
  ctx.fillStyle='#7a4e22'; ctx.fillRect(sx-7,sy+3,14,2);
  ctx.fillStyle='#e8c880'; ctx.fillRect(sx-10+walk*.3,sy-3,4,8);
  if(gath){
    ctx.save(); ctx.translate(sx+7,sy-2); ctx.rotate(.3+chop*.1);
    ctx.fillStyle='#e8c880'; ctx.fillRect(0,0,4,8);
    ctx.fillStyle='#4a2e10'; ctx.fillRect(2,-10,3,12);
    poly([[2,-11],[8,-8],[4,-3],[0,-6]],'#a0a0a8'); ctx.restore();
  }else{ ctx.fillStyle='#e8c880'; ctx.fillRect(sx+7-walk*.3,sy-3,4,8); }
  ctx.fillStyle='#e8c880'; ctx.beginPath(); ctx.arc(sx,sy-11,6.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4a2810'; ctx.beginPath(); ctx.arc(sx,sy-12,5,Math.PI,0); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.4)'; ctx.beginPath(); ctx.arc(sx-2.5,sy-11,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+2.5,sy-11,1.2,0,Math.PI*2); ctx.fill();
}

function drawSwordsman(e,sx,sy){
  const t=G.tick*.14, walk=e.mv?Math.sin(t)*4:0, att=e.task==='atk'&&e.acool<12;
  ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.ellipse(sx,sy+15,10,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#484858'; ctx.fillRect(sx-5+walk,sy+9,5,8); ctx.fillRect(sx+1-walk,sy+9,5,8);
  poly([[sx-8,sy-4],[sx+8,sy-4],[sx+7,sy+7],[sx-7,sy+7]],'#808898');
  poly([[sx-8,sy-4],[sx+8,sy-4],[sx+5,sy+1],[sx-5,sy+1]],'#484858');
  poly([[sx-13,sy-5],[sx-7,sy-6],[sx-6,sy+6],[sx-13,sy+5]],'#7a1818');

// ── Building sprites  (AoM: terracotta roofs, stone walls, 3D depth) ──────────

// Core: draw an iso-perspective box at screen position (sx,sy = front-bottom-center)
// w=front width, dep=depth offset, h=wall height
// top face is a parallelogram, front is rectangle, right side is parallelogram
function isoBox(sx,sy,w,dep,h,topC,frontC,sideC){
  const hw=w/2;
  // Points:
  const fl=[sx-hw, sy];      // front-left bottom
  const fr=[sx+hw, sy];      // front-right bottom
  const ft=[sx-hw, sy-h];    // front-left top
  const ftr=[sx+hw, sy-h];   // front-right top
  const sr=[sx+hw+dep,sy-dep*.5];          // side-right bottom
  const str2=[sx+hw+dep,sy-h-dep*.5];      // side-right top
  const tbl=[sx-hw+dep,sy-h-dep*.5];       // top-back-left

  // Top face (parallelogram)
  ctx.fillStyle=topC; ctx.beginPath();
  ctx.moveTo(ft[0],ft[1]); ctx.lineTo(ftr[0],ftr[1]);
  ctx.lineTo(str2[0],str2[1]); ctx.lineTo(tbl[0],tbl[1]);
  ctx.closePath(); ctx.fill();
  // Top edge highlight
  ctx.strokeStyle='rgba(255,255,255,.14)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ft[0],ft[1]); ctx.lineTo(ftr[0],ftr[1]); ctx.stroke();

  // Front face (rectangle)
  ctx.fillStyle=frontC; ctx.beginPath();
  ctx.moveTo(fl[0],fl[1]); ctx.lineTo(fr[0],fr[1]);
  ctx.lineTo(ftr[0],ftr[1]); ctx.lineTo(ft[0],ft[1]);
  ctx.closePath(); ctx.fill();
  // Front base shadow
  ctx.fillStyle='rgba(0,0,0,.1)'; ctx.fillRect(fl[0],sy-5,w,5);

  // Right side face
  ctx.fillStyle=sideC; ctx.beginPath();
  ctx.moveTo(fr[0],fr[1]); ctx.lineTo(sr[0],sr[1]);
  ctx.lineTo(str2[0],str2[1]); ctx.lineTo(ftr[0],ftr[1]);
  ctx.closePath(); ctx.fill();
}

function drawTC(sx,sy){
  // Ground shadow
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath(); ctx.ellipse(sx+12,sy+14,74,24,.1,0,Math.PI*2); ctx.fill();

  // Outer wall compound (wide, low stone)
  isoBox(sx,sy,128,52,26,'#c8bc98','#b8aa88','#a09070');
  // Stone block joints on front wall
  ctx.strokeStyle='rgba(0,0,0,.1)'; ctx.lineWidth=1;
  for(let i=0;i<4;i++) ctx.strokeRect(sx-62+i*32,sy-26,32,26);

  // Inner keep / temple (raised on outer wall)
  const ky=sy-26;
  isoBox(sx,ky,90,42,46,'#dcd4b4','#ccc4a4','#b4ac8c');

  // Greek columns (5 across front of keep)
  for(let i=0;i<5;i++){
    const cx=sx-40+i*20;
    // Column shadow
    ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fillRect(cx+3,ky-44+4,5,46);
    // Marble shaft
    ctx.fillStyle='#eee8d4'; ctx.fillRect(cx,ky-44,8,46);
    // Shadow edge
    ctx.fillStyle='rgba(0,0,0,.07)'; ctx.fillRect(cx,ky-44,2,46);
    // Capital
    ctx.fillStyle='#e0d8c0'; ctx.fillRect(cx-2,ky-46,12,4);
    // Base
    ctx.fillRect(cx-1,ky+2,10,3);
  }

  // Terracotta pitched roof on keep
  const ry=ky-46;
  ctx.fillStyle='#b83018';
  poly([[sx-46,ry],[sx+46,ry],[sx+40,ry-28],[sx-40,ry-28]],'#b83018');
  ctx.fillStyle='#982810';
  poly([[sx-46,ry],[sx-40,ry-28],[sx-52,ry-22]],'#982810');
  // Ridge cap
  ctx.fillStyle='#d04020'; ctx.fillRect(sx-40,ry-30,80,5);
  // Tile lines
  ctx.strokeStyle='#801808'; ctx.lineWidth=1;
  for(let i=1;i<7;i++){
    ctx.beginPath(); ctx.moveTo(sx-44+i*13,ry); ctx.lineTo(sx-38+i*11,ry-28); ctx.stroke();
  }
  // Acroterion
  ctx.fillStyle='#d4c880'; ctx.beginPath(); ctx.arc(sx,ry-30,5,0,Math.PI*2); ctx.fill();

  // Gate arch on front wall
  ctx.fillStyle='#2a1808'; ctx.beginPath(); ctx.arc(sx,sy-13,15,Math.PI,0); ctx.fill(); ctx.fillRect(sx-15,sy-13,30,13);
  ctx.fillStyle='#6a3a18'; ctx.fillRect(sx-11,sy-11,22,11);
  ctx.strokeStyle='#404848'; ctx.lineWidth=1.5;
  for(let i=0;i<5;i++){ ctx.beginPath(); ctx.moveTo(sx-10+i*5,sy-11); ctx.lineTo(sx-10+i*5,sy); ctx.stroke(); }

  // Corner towers
  [sx-64,sx+64].forEach(tx=>{
    ctx.fillStyle='rgba(0,0,0,.2)'; ctx.beginPath(); ctx.ellipse(tx+4,sy-16,15,5,.1,0,Math.PI*2); ctx.fill();
    isoBox(tx,sy-16,30,16,34,'#b8b09a','#a8a08a','#908870');
    for(let i=0;i<4;i++){ ctx.fillStyle='#b8b09a'; ctx.fillRect(tx-13+i*8,sy-52,6,10); }
    ctx.fillStyle='#b83018';
    poly([[tx-15,sy-50],[tx+15,sy-50],[tx,sy-66]],'#b83018');
    ctx.fillStyle='#d04020';
    poly([[tx-15,sy-50],[tx,sy-66],[tx-8,sy-58]],'#d04020');
  });

  // Flag
  const fw=Math.sin(G.tick*.055)*7;
  ctx.strokeStyle='#5a3010'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(sx,ry-30); ctx.lineTo(sx,ry-60); ctx.stroke();
  poly([[sx,ry-60],[sx+24+fw,ry-48],[sx,ry-36]],'#cc1818');
  poly([[sx,ry-60],[sx+12+fw*.5,ry-54],[sx,ry-48]],'#ff4040');
}

function tickFx(){
  for(let i=FX.length-1;i>=0;i--){
    const p=FX[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.15; p.t-=.055;
    if(p.t<=0){FX.splice(i,1);continue;}
    // Particles float upward in screen space from iso position
    const iso=worldToIso(p.x,p.y);
    ctx.globalAlpha=p.t; ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(iso.x, iso.y+p.vy*6, 2, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── Terrain generation ────────────────────────────────
function genTerrain(){
  // Simple noise using sin/cos harmonics
  function nv(nx,ny){
    return (Math.sin(nx*13.1+1.7)*Math.cos(ny*9.4+.8)*.5+.5
          + Math.sin(nx*5.3+ny*7.2)*.25
          + Math.sin(nx*2.1-ny*3.4+2.5)*.15
          + Math.cos(nx*18.2+ny*14.6)*.08);
  }
  for(let r=0;r<ROWS;r++){
    terrain[r]=[];
    for(let c=0;c<COLS;c++){
      const nx=c/COLS, ny=r/ROWS;
      const v=nv(nx,ny);
      terrain[r][c]=v>1.25?'mtn':v>1.0?'hill':v>0.35?'grass':v>0.2?'sand':'water';
    }
  }
  // Shore pass: make water-adjacent grass into sand
  for(let r=1;r<ROWS-1;r++)for(let c=1;c<COLS-1;c++){
    if(terrain[r][c]==='grass'){
      const ns=[terrain[r-1][c],terrain[r+1][c],terrain[r][c-1],terrain[r][c+1]];
      if(ns.includes('water'))terrain[r][c]='sand';
    }
  }
  // River: winding vertical S-curve
  const mx=Math.floor(COLS*0.38);
  for(let r=0;r<ROWS;r++){
    const cx=mx+Math.floor(Math.sin(r/ROWS*Math.PI*3)*18);
    for(let d=-2;d<=2;d++){const cc=cx+d;if(cc>=0&&cc<COLS)terrain[r][cl(cc,0,COLS-1)]='water';}
  }
  // Clear player start area
  const pr=Math.floor(440/TILE),pc=Math.floor(480/TILE);
  for(let r=pr-4;r<pr+26;r++)for(let c=pc-4;c<pc+34;c++)if(r>=0&&r<ROWS&&c>=0&&c<COLS)terrain[r][c]='grass';
  // Clear enemy start area
  const EX=Math.floor(G.MW*0.75),EY=Math.floor(G.MH*0.76);
  const er=Math.floor(EY/TILE),ec=Math.floor(EX/TILE);
  for(let r=er-4;r<er+24;r++)for(let c=ec-4;c<ec+28;c++)if(r>=0&&r<ROWS&&c>=0&&c<COLS)terrain[r][c]='grass';
}

function dropoff(e){let b=null,bd=9e9;for(const f of G.ents){if(!f.dead&&!f.enemy&&f.bld&&f.built&&f.type==='tc'){const d=dist(e,f);if(d<bd){bd=d;b=f;}}}return b;}

function moveto(e,tx,ty,s=5){const d=dist(e,{x:tx,y:ty});if(d<s)return;e.vx=(tx-e.x)/d*e.spd;e.vy=(ty-e.y)/d*e.spd;}

function vilIdle(e){
  const ne=nearestFoe(e,150);if(ne){e.task='atk';e.tgt=ne;return;}
  if(e.ca>=50){const tc=dropoff(e);if(!tc)return;if(dist(e,tc)<46){G.res[e.cr]+=e.ca;e.ca=0;e.cr=null;}else moveto(e,tc.x,tc.y,42);return;}
  const ub=G.ents.find(b=>b.bld&&!b.dead&&!b.built&&!b.enemy&&dist(e,b)<360);
  if(ub){e.task='build';e.tgt=ub;return;}
  let bestR=null,bd=9e9;
  const need=G.res.food<300?'food':G.res.wood<300?'tree':'gold';
  for(const r of RMAP){
    if(r.hp<=0)continue;
    const ok=(need==='gold'&&(r.type==='gold'||r.type==='stone'))||(need==='tree'&&r.type==='tree')||(need==='food'&&(r.type==='deer'||r.type==='berry'||r.type==='fish'));
    if(!ok)continue;
    const gath=G.ents.filter(u=>!u.dead&&u.task==='gath'&&u.tgt===r).length;
    if(gath>=2)continue;
    const d=dist(e,r);if(d<bd){bd=d;bestR=r;}
  }
  if(!bestR)for(const r of RMAP){if(r.hp<=0)continue;const d=dist(e,r);if(d<bd){bd=d;bestR=r;}}
  if(bestR){e.task='gath';e.tgt=bestR;}
}
function eVilIdle(e){
  if(e.ca>=50){const tc=eDropoff(e);if(!tc)return;if(dist(e,tc)<46){G.eRes[e.cr]=(G.eRes[e.cr]||0)+e.ca;e.ca=0;e.cr=null;}else moveto(e,tc.x,tc.y,42);return;}
  let bestR=null,bd=9e9;
  const need=(G.eRes.food||0)<300?'deer':(G.eRes.wood||0)<300?'tree':'gold';
  for(const r of RMAP){
    if(r.hp<=0)continue;
    const ok=(need==='gold'&&(r.type==='gold'||r.type==='stone'))||(need==='tree'&&r.type==='tree')||(need==='deer'&&r.type==='deer');
    if(!ok)continue;
    const d=dist(e,r);if(d<bd){bd=d;bestR=r;}
  }
  if(bestR){e.task='gath';e.tgt=bestR;}
}
function eAfford(c){for(const[k,v]of Object.entries(c||{}))if((G.eRes[k]||0)<v)return false;return true;}
function eSpend(c){for(const[k,v]of Object.entries(c||{}))G.eRes[k]=(G.eRes[k]||0)-v;}

function enemyBuildAI(){
  if(G.tick%480!==0)return;
  const anchor=G.ents.find(e=>e.enemy&&e.bld&&e.type==='tc'&&!e.dead);
  if(!anchor)return;
  const counts={};
  for(const e of G.ents)if(e.enemy&&e.bld&&!e.dead)counts[e.type]=(counts[e.type]||0)+1;
  let btype=null;
  if(!counts.house||(counts.house||0)<3){btype='house';}
  else if(!(counts.bks)&&eAfford(BD.bks.cost)){btype='bks';}
  else if(!(counts.range)&&eAfford(BD.range.cost)){btype='range';}
  else if((counts.house||0)<5){btype='house';}
  if(!btype||!eAfford(BD[btype].cost))return;
  const bx=anchor.x+rand(-200,200),by=anchor.y+rand(-200,200);
  const b=mkBld(btype,cl(bx,80,G.MW-80),cl(by,80,G.MH-80),false,true);
  eSpend(BD[btype].cost);
  // Assign an enemy villager to build it
  const ev=G.ents.find(e=>e.enemy&&!e.bld&&e.type==='villager'&&!e.dead);
  if(ev){ev.task='build';ev.tgt=b;}
}

function aiEvil(e){
  if(e.bld){
    // Tower auto-attack
    if(e.rng>0&&e.acool<=0){
      const foe=nearestFoe(e,e.rng);
      if(foe){foe.hp-=e.dmg;addFx(foe.x,foe.y,'#ff4020');e.acool=80;if(foe.hp<=0){foe.dead=true;addFx(foe.x,foe.y,'#ff8000');}}
    }
    if(e.acool>0)e.acool--;
    // Train from barracks/range
    if(e.tq&&e.tq.length){
      e.tt--;
      if(e.tt<=0){
        const ut=e.tq.shift();const d=ED[ut]||UD[ut];
        if(d){mkUnit(ut,e.x+rand(-40,40),e.y+rand(-40,40),true);}
        e.tt=25*60;
      }
    } else if(e.built&&(e.type==='bks'||e.type==='range')&&G.tick%600===0){
      const ut=e.type==='bks'?'orc':'goblin';
      e.tq.push(ut);e.tt=25*60;
    }
    return;
  }
  // Villager building
  if(e.task==='build'&&e.tgt&&!e.tgt.dead){
    if(dist(e,e.tgt)<52){e.tgt.hp=Math.min(e.tgt.mhp,e.tgt.hp+0.8);if(e.tgt.hp>=e.tgt.mhp){e.tgt.built=true;e.task=null;e.tgt=null;}}
    else moveto(e,e.tgt.x,e.tgt.y,48);
    e.mv=true;return;
  }
  // Gather
  if(e.task==='gath'&&e.tgt){
    if(e.tgt.hp<=0){e.task=null;return;}
    if(dist(e,e.tgt)<36){
      if(e.gcool<=0){e.ca+=6;e.cr=e.tgt.type==='deer'?'food':e.tgt.type==='tree'?'wood':e.tgt.type==='gold'?'gold':'stone';e.tgt.hp-=6;e.gcool=30;}
      e.gcool--;e.mv=false;
    }else{moveto(e,e.tgt.x,e.tgt.y,32);e.mv=true;}
    return;
  }
  // Attack if triggered
  if(G.playerAttacked){
    if(e.task==='atk'&&e.tgt&&!e.tgt.dead){
      if(dist(e,e.tgt)<e.rng){
        if(e.acool<=0){e.tgt.hp-=e.dmg;addFx(e.tgt.x,e.tgt.y,'#ff0000');e.acool=60;if(e.tgt.hp<=0){e.tgt.dead=true;addFx(e.tgt.x,e.tgt.y,'#cc0000');e.task=null;}}
        e.acool--;e.mv=false;
      }else{moveto(e,e.tgt.x,e.tgt.y,e.rng-4);e.mv=true;}
      return;
    }
    if(e.at<=0){
      const foe=nearestFoe(e,G.GRACE);
      if(foe){e.task='atk';e.tgt=foe;}
      e.at=90;
    }
    e.at--;
  }
  eVilIdle(e);
}

// ── Player unit AI tick ────────────────────────────────
function tickEnt(e){
  if(e.dead)return;
  e.x=cl(e.x+e.vx,0,G.MW);e.y=cl(e.y+e.vy,0,G.MH);
  e.mv=Math.abs(e.vx)+Math.abs(e.vy)>0.05;
  e.vx*=.72;e.vy*=.72;
  if(e.enemy){aiEvil(e);return;}
  // Building: auto-attack + train queue
  if(e.bld){
    if(e.rng>0&&e.acool<=0){
      const foe=nearestFoe(e,e.rng);
      if(foe){foe.hp-=e.dmg;addFx(foe.x,foe.y,'#ffaa20');e.acool=80;if(foe.hp<=0){foe.dead=true;addFx(foe.x,foe.y,'#ff8000');}}
    }
    if(e.acool>0)e.acool--;
    if(e.gen&&e.built){for(const[k,v]of Object.entries(e.gen))G.res[k]+=v;}
    if(e.tq&&e.tq.length){
      e.tt--;
      if(e.tt<=0){
        const ut=e.tq.shift();const d=UD[ut];
        if(d){mkUnit(ut,e.x+rand(-50,50),e.y+rand(-50,50));pop();}
        e.tt=d?d.tt:1500;
      }
    }
    // Construction progress (player builds)
    if(!e.built){const bdr=G.ents.find(u=>!u.dead&&!u.enemy&&u.task==='build'&&u.tgt===e);if(!bdr)e.hp=Math.min(e.mhp,e.hp+.05);}
    return;
  }
  // Gather
  if(e.task==='gath'&&e.tgt){
    if(e.tgt.hp<=0){e.task=null;return;}
    if(dist(e,e.tgt)<36){
      if(e.gcool<=0){e.ca+=6;e.cr=e.tgt.type==='deer'||e.tgt.type==='berry'||e.tgt.type==='fish'?'food':e.tgt.type==='tree'?'wood':e.tgt.type==='gold'?'gold':'stone';e.tgt.hp-=6;e.gcool=30;}
      e.gcool--;e.mv=false;
    }else{moveto(e,e.tgt.x,e.tgt.y,32);e.mv=true;}
    return;
  }
  // Build task
  if(e.task==='build'&&e.tgt&&!e.tgt.dead){
    if(dist(e,e.tgt)<52){
      e.tgt.hp=Math.min(e.tgt.mhp,e.tgt.hp+1.2);
      if(e.tgt.hp>=e.tgt.mhp){
        e.tgt.built=true;
        e.task=null;e.tgt=null; // free the villager
        e.idle=0; // trigger vilIdle immediately so they find new work
      }
    }else moveto(e,e.tgt.x,e.tgt.y,48);
    e.mv=true;return;
  }
  // Attack task
  if(e.task==='atk'&&e.tgt&&!e.tgt.dead){
    if(dist(e,e.tgt)<e.rng){
      if(e.acool<=0){
        e.tgt.hp-=e.dmg;addFx(e.tgt.x,e.tgt.y,'#ffaa20');e.acool=55;
        if(!e.tgt.enemy)G.playerAttacked=true;
        if(e.tgt.hp<=0){e.tgt.dead=true;addFx(e.tgt.x,e.tgt.y,'#ff6000');e.task=null;}
      }
      e.acool--;e.mv=false;
    }else{moveto(e,e.tgt.x,e.tgt.y,e.rng-4);e.mv=true;}
    return;
  }
  // Move task
  if(e.task==='move'&&e.mtgt){
    if(dist(e,e.mtgt)<6){e.task=null;e.mtgt=null;}
    else moveto(e,e.mtgt.x,e.mtgt.y,5);
    return;
  }
  // Idle behaviour
  e.idle--;
  if(e.idle<=0){
    e.idle=rand(180,400);
    if(e.type==='villager')vilIdle(e);
    else{
      const ne=nearestFoe(e,200);
      if(ne){e.task='atk';e.tgt=ne;}
    }
  }
}

function tickEnts(){
  for(const e of G.ents)tickEnt(e);
  // Deer wander
  for(const r of RMAP){
    if(r.type!=='deer'||r.hp<=0)continue;
    r.wt--;if(r.wt<=0){r.ang+=rand(-.6,.6);r.vx=Math.cos(r.ang)*.3;r.vy=Math.sin(r.ang)*.3;r.wt=rand(60,180);}
    r.x=cl(r.x+r.vx,40,G.MW-40);r.y=cl(r.y+r.vy,40,G.MH-40);
  }
  // Fish swim
  for(const r of RMAP){
    if(r.type!=='fish'||r.hp<=0)continue;
    r.wt--;if(r.wt<=0){r.ang+=rand(-.4,.4);r.vx=Math.cos(r.ang)*.2;r.vy=Math.sin(r.ang)*.2;r.wt=rand(80,220);}
    r.x=cl(r.x+r.vx,40,G.MW-40);r.y=cl(r.y+r.vy,40,G.MH-40);
  }
  G.ents=G.ents.filter(e=>!e.dead||(e.bld&&e.dead===false));
  G.ents=G.ents.filter(e=>!e.dead);
}

function spawnWave(){
  if(!G.playerAttacked)return;
  G.spawnTimer--;
  if(G.spawnTimer>0)return;
  G.phase++;
  const n=Math.min(G.phase,5);
  const anchor=G.ents.find(e=>e.enemy&&e.bld&&e.type==='tc'&&!e.dead);
  if(anchor){
    for(let i=0;i<n;i++){
      const ut=G.phase<4?'goblin':G.phase<8?'orc':'troll';
      mkUnit(ut,anchor.x+rand(-80,80),anchor.y+rand(-80,80),true);
    }
  }
  G.spawnTimer=Math.max(600,2400-G.phase*180);
  // Check win/loss
  const pTC=G.ents.find(e=>!e.enemy&&e.bld&&e.type==='tc'&&!e.dead);
  const eTC=G.ents.find(e=>e.enemy&&e.bld&&e.type==='tc'&&!e.dead);
  if(!pTC){G.over=true;G.win=false;endScreen();}
  if(!eTC){G.over=true;G.win=true;endScreen();}
  enemyBuildAI();
}

// ── Camera scroll ─────────────────────────────────────
function camUpdate(){
  const spd=6;
  const edgeW=IS_TOUCH?0:30;
  if((keys['ArrowLeft']||keys['a'])||(mouse.x<edgeW&&mouse.x>=0))G.cam.x-=spd;
  if((keys['ArrowRight']||keys['d'])||(mouse.x>L.W-edgeW&&mouse.x<L.W))G.cam.x+=spd;
  if((keys['ArrowUp']||keys['w'])||(mouse.y>L.topH&&mouse.y<L.topH+edgeW))G.cam.y-=spd;
  if((keys['ArrowDown']||keys['s'])||(mouse.y>L.H-L.hudH-edgeW&&mouse.y<L.H-L.hudH))G.cam.y+=spd;
  if(JOY.active){G.cam.x+=JOY.dx*spd*2.5;G.cam.y+=JOY.dy*spd*2.5;}
  // Iso map bounds: the map spans from iso(0,0) to iso(COLS,ROWS)
  const isoMin=tileToIso(0,0);
  const isoMax=tileToIso(COLS-1,ROWS-1);
  G.cam.x=cl(G.cam.x, isoMin.x - L.W*.3, isoMax.x - L.W*.5);
  G.cam.y=cl(G.cam.y, isoMin.y - L.gameH*.1, isoMax.y - L.gameH*.5);
}

// ── Main render ───────────────────────────────────────
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#040810';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.beginPath(); ctx.rect(0,0,L.W,L.gameH); ctx.clip();
  ctx.translate(-G.cam.x, -G.cam.y);

  // ── Iso tile culling ──────────────────────────────
  const vx0=G.cam.x - ITW*2;
  const vx1=G.cam.x + L.W + ITW*2;
  const vy0=G.cam.y - ITH*6;
  const vy1=G.cam.y + L.gameH + ITH*6;

  const mg=4;
  const dMin=Math.max(0, Math.floor((vy0/(ITH/2)) - mg));
  const dMax=Math.min(COLS+ROWS-2, Math.ceil((vy1/(ITH/2)) + mg));

  for(let d=dMin; d<=dMax; d++){
    const cLo=Math.max(0, d-(ROWS-1));
    const cHi=Math.min(COLS-1, d);
    for(let c=cLo; c<=cHi; c++){
      const r=d-c;
      const tx=(c-r)*(ITW/2), ty=(c+r)*(ITH/2);
      if(tx+ITW < vx0 || tx-ITW > vx1) continue;
      if(ty+ITH < vy0 || ty-ITH > vy1) continue;
      drawTileSides(c,r);
    }
  }

  for(let d=dMin; d<=dMax; d++){
    const cLo=Math.max(0, d-(ROWS-1));
    const cHi=Math.min(COLS-1, d);
    for(let c=cLo; c<=cHi; c++){
      const r=d-c;
      const tx=(c-r)*(ITW/2), ty=(c+r)*(ITH/2);
      if(tx+ITW < vx0 || tx-ITW > vx1) continue;
      if(ty+ITH < vy0 || ty-ITH > vy1) continue;
      drawTileTop(c,r);
    }
  }

  // All objects sorted back-to-front — drawn after ALL terrain, so nothing clips
  const allObjs=[...RMAP.filter(r=>r.hp>0),...G.ents.filter(e=>!e.dead)];
  allObjs.sort((a,b)=>(a.x+a.y)-(b.x+b.y));

  for(const e of allObjs){
    const iso=worldToIso(e.x,e.y);
    const sx=iso.x, sy=iso.y;
    if(sx+200 < vx0 || sx-200 > vx1 || sy+200 < vy0 || sy-200 > vy1) continue;

      if(e.type==='tree'){ drawTree(e,sx,sy); continue; }
      if(e.type==='gold'){ drawGold(e,sx,sy); continue; }
      if(e.type==='stone'){ drawStone(e,sx,sy); continue; }
      if(e.type==='deer'){ drawDeer(e,sx,sy); continue; }
      if(e.type==='berry'){ drawBerry(e,sx,sy); continue; }
      if(e.type==='fish'){ drawFish(e,sx,sy); continue; }

      if(e.sel&&!e.bld){
        ctx.strokeStyle='rgba(60,230,60,.9)'; ctx.lineWidth=2; ctx.setLineDash([5,3]);
        ctx.beginPath(); ctx.ellipse(sx,sy+ITH*.3,ITW*.22,ITH*.14,.05,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      }

      ctx.globalAlpha=(!e.bld||e.built)?1:.45;
      if(e.bld){
        if(!e.built){
          ctx.save(); ctx.globalAlpha=.35;
          ctx.strokeStyle='rgba(240,200,60,.8)'; ctx.lineWidth=2; ctx.setLineDash([5,4]);
          ctx.strokeRect(sx-e.w/2,sy-e.h/2,e.w,e.h); ctx.setLineDash([]); ctx.restore();
        }
        switch(e.type){
          case'tc': drawTC(sx,sy); break;
          case'house': drawHouse(sx,sy); break;
          case'bks': drawBarracks(sx,sy); break;
          case'range': drawRange(sx,sy); break;
          case'stable': drawStable(sx,sy); break;
          case'farm': drawFarm(sx,sy); break;
          case'mine': drawMine(sx,sy); break;
          case'tower': drawTower(sx,sy); break;
          case'wall': drawWall(sx,sy); break;
          case'siege': drawSiege(sx,sy); break;
          default: ctx.fillStyle='#706858'; ctx.fillRect(sx-e.w/2,sy-e.h/2,e.w,e.h);
        }
        if(e.sel){ ctx.strokeStyle='rgba(60,230,60,.8)'; ctx.lineWidth=2.5; ctx.setLineDash([5,3]); ctx.strokeRect(sx-e.w/2-4,sy-e.h/2-4,e.w+8,e.h+8); ctx.setLineDash([]); }
      }else{
        // Scale up units for visibility
        ctx.save();
        ctx.translate(sx,sy); ctx.scale(UNIT_SCALE,UNIT_SCALE); ctx.translate(-sx,-sy);
        switch(e.type){
          case'villager': drawVillager(e,sx,sy); break;
          case'militia': drawSwordsman(e,sx,sy); break;
          case'archer': drawArcher(e,sx,sy); break;
          case'horseman': drawCavalry(e,sx,sy); break;
          case'catapult': drawCatapult(e,sx,sy); break;
          case'goblin': drawGoblin(e,sx,sy); break;
          case'orc': drawOrc(e,sx,sy); break;
          case'troll': drawTroll(e,sx,sy); break;
          default: ctx.fillStyle='#808080'; ctx.beginPath(); ctx.arc(sx,sy,13,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
      }
      ctx.globalAlpha=1;

      if(e.hp<e.mhp&&e.hp>0){
        const p=e.hp/e.mhp, bw=e.bld?e.w:30, bx=sx-bw/2, by=sy-(e.bld?e.h/2+18:36);
        ctx.fillStyle='rgba(0,0,0,.75)'; ctx.fillRect(bx-1,by-1,bw+2,8);
        ctx.fillStyle=p>.5?'#28781a':p>.25?'#c09010':'#cc2020'; ctx.fillRect(bx,by,bw*p,6);
      }
      if(e.bld&&e.tq&&e.tq.length>0){
        const dd=UD[e.tq[0]]; if(dd){ const p=e.tt/dd.tt; ctx.strokeStyle='#f8d040'; ctx.lineWidth=3.5; ctx.beginPath(); ctx.arc(sx,sy,20,-Math.PI/2,-Math.PI/2+Math.PI*2*p,false); ctx.stroke(); }
      }
    }

  tickFx();

  // Build ghost
  if(G.bmode){
    const d=BD[G.bmode], can=afford(d.cost);
    const giso=worldToIso(ghost.x,ghost.y);
    ctx.strokeStyle=can?'rgba(60,230,60,.9)':'rgba(220,50,50,.9)';
    ctx.lineWidth=2; ctx.setLineDash([6,4]);
    ctx.strokeRect(giso.x-d.w/2,giso.y-d.h/2,d.w,d.h); ctx.setLineDash([]);
    ctx.fillStyle=can?'rgba(60,220,60,.1)':'rgba(220,50,50,.1)';
    ctx.fillRect(giso.x-d.w/2,giso.y-d.h/2,d.w,d.h);
  }

  ctx.restore();
}

function renderMM(){
  const mw=L.mmSize, mh=L.mmSize;
  const scx=mw/G.MW, scy=mh/G.MH;
  // Draw map top-down (mmFrame CSS rotates it 45deg to show iso diamond)
  mctx.fillStyle='#1a2a10'; mctx.fillRect(0,0,mw,mh);
  for(let r=0;r<ROWS;r+=2) for(let c=0;c<COLS;c+=2){
    const t=terrain[r]&&terrain[r][c];
    let col='#3a6618';
    if(t==='water') col='#1e5898';
    else if(t==='shallow') col='#2870a8';
    else if(t==='sand') col='#b89a48';
    else if(t==='grass2') col='#3a6a1a';
    else if(t==='hill') col='#7a7248';
    else if(t==='mtn') col='#6a6858';
    else if(t==='path') col='#b8a068';
    mctx.fillStyle=col;
    mctx.fillRect(c*TILE*scx,r*TILE*scy,TILE*scx*2+1,TILE*scy*2+1);
  }
  for(const r of RMAP){
    if(r.hp<=0) continue;
    if(r.type==='tree'){mctx.fillStyle='#1a5010'; mctx.fillRect(r.x*scx-1,r.y*scy-1,3,3);}
    else if(r.type==='berry'){mctx.fillStyle='#c0304a'; mctx.fillRect(r.x*scx-.5,r.y*scy-.5,2,2);}
    else if(r.type==='gold'){mctx.fillStyle='#d8a810'; mctx.fillRect(r.x*scx-1,r.y*scy-1,2,2);}
    else if(r.type==='stone'){mctx.fillStyle='#909080'; mctx.fillRect(r.x*scx-1,r.y*scy-1,2,2);}
  }
  for(const e of G.ents){
    if(e.dead) continue;
    mctx.fillStyle=e.enemy?(e.bld?'#ff3030':'#ee1818'):(e.bld?(e.built?'#f0c040':'#806020'):'#40e040');
    const sz=e.bld?Math.max(3,(e.w*scx*.6)|0):3;
    mctx.fillRect(e.x*scx-sz/2,e.y*scy-sz/2,sz,sz);
  }
  // Camera viewport indicator
  const tl=isoToWorld(G.cam.x, G.cam.y);
  const br=isoToWorld(G.cam.x+L.W, G.cam.y+L.gameH);
  const vx=Math.min(tl.x,br.x)*scx, vy=Math.min(tl.y,br.y)*scy;
  const vw=(Math.abs(br.x-tl.x))*scx, vh=(Math.abs(br.y-tl.y))*scy;
  mctx.strokeStyle='rgba(240,200,60,.9)'; mctx.lineWidth=1.5;
  mctx.strokeRect(vx, vy, vw, vh);
}

const JOY={dx:0,dy:0,active:false,tid:null};
(function initJoystick(){
  const wrap=document.getElementById('joystickWrap');
  const base=document.getElementById('joystickBase');
  const knob=document.getElementById('joystickKnob');
  const R=28; // max knob travel radius

  function joyMove(cx,cy){
    const rect=base.getBoundingClientRect();
    const ox=cx-(rect.left+rect.width/2);
    const oy=cy-(rect.top+rect.height/2);
    const d=Math.hypot(ox,oy);
    const nx=d>R?ox/d*R:ox;
    const ny=d>R?oy/d*R:oy;
    knob.style.transform=`translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
    JOY.dx=nx/R; JOY.dy=ny/R;
  }
  function joyReset(){
    knob.style.transform='translate(-50%,-50%)';
    JOY.dx=0; JOY.dy=0; JOY.active=false; JOY.tid=null;
  }
  wrap.addEventListener('touchstart',e=>{
    e.preventDefault(); e.stopPropagation();
    JOY.active=true;
    JOY.tid=e.changedTouches[0].identifier;
    joyMove(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  },{passive:false});
  document.addEventListener('touchmove',e=>{
    if(!JOY.active) return;
    for(const t of e.changedTouches){
      if(t.identifier===JOY.tid){ joyMove(t.clientX,t.clientY); break; }
    }
  },{passive:true});
  document.addEventListener('touchend',e=>{
    for(const t of e.changedTouches){ if(t.identifier===JOY.tid){ joyReset(); break; } }
  });
})();

// ── CMD mode button (touch: toggle command mode) ──────
const CMD_STATE={cmdMode:false};
(function initCmdBtn(){
  const btn=document.getElementById('cmdBtn');
  btn.addEventListener('click',()=>{
    CMD_STATE.cmdMode=!CMD_STATE.cmdMode;
    if(CMD_STATE.cmdMode){
      if(!G.sel.length&&!G.bmode){ CMD_STATE.cmdMode=false; notify('Select a unit first!'); return; }
      btn.classList.add('active');
      btn.querySelector('.ci').textContent='🎯';
      btn.querySelector('.cl').textContent='TAP';
      notify('🎯 Tap to command selected units');
    } else {
      btn.classList.remove('active');
      btn.querySelector('.ci').textContent='⚔';
      btn.querySelector('.cl').textContent='CMD';
    }
  });
})();

const mouse={x:-999,y:-999};
const ghost={x:400,y:400}; // build ghost world-coords

// screenToWorld defined in drawing engine above

// ── Core action functions ──────────────────────────────
function doSelect(sx,sy){
  const {x:wx,y:wy}=screenToWorld(sx,sy);
  for(const e of G.ents) e.sel=false;
  G.sel=[];
  for(let i=G.ents.length-1;i>=0;i--){
    const e=G.ents[i]; if(e.dead) continue;
    const h=(e.w||26)/2+8;
    if(Math.abs(e.x-wx)<h&&Math.abs(e.y-wy)<h){
      if(!e.enemy){e.sel=true;G.sel=[e];}
      break;
    }
  }
  updSel();
}

function doCommand(sx,sy){
  // Right-click / long-press: command selected units
  if(G.bmode){ doPlace(sx,sy); return; }
  if(!G.sel.length) return;
  const {x:wx,y:wy}=screenToWorld(sx,sy);
  let tE=null,tR=null;
  for(const e of G.ents){
    if(e.dead) continue;
    const h=(e.w||26)/2+8;
    if(Math.abs(e.x-wx)<h&&Math.abs(e.y-wy)<h){tE=e;break;}
  }
  if(!tE) for(const r of RMAP){
    if(r.hp>0&&Math.abs(r.x-wx)<28&&Math.abs(r.y-wy)<28){tR=r;break;}
  }
  for(const e of G.sel){
    if(e.bld){e.rallyX=wx;e.rallyY=wy;continue;}
    if(tE&&tE.enemy){e.task='atk';e.tgt=tE;e.mtgt=null;G.playerAttacked=true;}
    else if(tR&&e.type==='villager'){e.task='gath';e.tgt=tR;e.mtgt=null;e.cr=null;}
    else{e.task='move';e.mtgt={x:wx+rand(-22,22),y:wy+rand(-22,22)};e.tgt=null;}
  }
}

function doPlace(sx,sy){
  if(!G.bmode) return;
  const d=BD[G.bmode];
  if(!d){G.bmode=null;updAct();return;}
  if(!afford(d.cost)){notify('Not enough resources!');G.bmode=null;updAct();return;}
  const vils=G.sel.filter(e=>e.type==='villager'&&!e.enemy);
  if(!vils.length){notify('Select a villager first, then choose a building!');G.bmode=null;updAct();return;}
  const {x:wx,y:wy}=screenToWorld(sx,sy);
  spend(d.cost);
  const b=mkBld(G.bmode,wx,wy,false);
  for(const v of vils){v.task='build';v.tgt=b;v.mtgt=null;}
  notify(d.name+' placed!');
  G.bmode=null;
  updAct();
}

function doDragSel(){
  const w0=screenToWorld(Math.min(G.ds.x,G.de.x), Math.min(G.ds.y,G.de.y));
  const w1=screenToWorld(Math.max(G.ds.x,G.de.x), Math.max(G.ds.y,G.de.y));
  G.sel=[];
  for(const e of G.ents){
    e.sel=false;
    if(e.dead||e.enemy||e.bld)continue;
    if(e.x>=w0.x&&e.x<=w1.x&&e.y>=w0.y&&e.y<=w1.y){G.sel.push(e);e.sel=true;}
  }
  updSel();
}

function updSelBox(){
  const sb=document.getElementById('selBox');
  sb.style.display='block';
  sb.style.left=Math.min(G.ds.x,G.de.x)+'px';
  sb.style.top=Math.min(G.ds.y,G.de.y)+'px';
  sb.style.width=Math.abs(G.de.x-G.ds.x)+'px';
  sb.style.height=Math.abs(G.de.y-G.ds.y)+'px';
}

// Keep old names as aliases for backward compat
function leftClick(sx,sy){doSelect(sx,sy);}
function rightClick(sx,sy){doCommand(sx,sy);}
function placeB(sx,sy){doPlace(sx,sy);}

// ── Mouse ─────────────────────────────────────────────
const tip=document.getElementById('tip');
canvas.addEventListener('mousemove',ev=>{
  mouse.x=ev.clientX; mouse.y=ev.clientY;
  if(G.drag){ G.de.x=ev.clientX; G.de.y=ev.clientY; updSelBox(); }
  const w=screenToWorld(ev.clientX,ev.clientY);
  ghost.x=w.x; ghost.y=w.y;
  let found=null;
  for(const e of G.ents){
    if(e.dead) continue;
    const h=(e.w||26)/2+6;
    if(Math.abs(e.x-w.x)<h&&Math.abs(e.y-w.y)<h){found=e;break;}
  }
  if(found){
    tip.style.display='block';
    tip.style.left=(ev.clientX+14)+'px';
    tip.style.top=Math.max(L.topH+4,ev.clientY-36)+'px';
    tip.innerHTML=`<b>${found.name}</b>HP: ${Math.ceil(found.hp)}/${found.mhp}${found.task?`<br>${found.task}`:''}${found.ca>0?`<br>Carrying ${found.ca} ${found.cr}`:''}`.replace(/undefined/g,'');
  } else tip.style.display='none';
});
canvas.addEventListener('mousedown',ev=>{
  if(ev.button!==0) return;
  // Don't start drag if in build mode — placement handled on mouseup
  if(G.bmode) return;
  G.drag=true;
  G.ds.x=ev.clientX; G.ds.y=ev.clientY;
  G.de.x=ev.clientX; G.de.y=ev.clientY;
});
canvas.addEventListener('mouseup',ev=>{
  if(ev.button!==0) return;
  if(G.bmode){ doPlace(ev.clientX,ev.clientY); return; }
  if(!G.drag) return;
  G.drag=false;
  document.getElementById('selBox').style.display='none';
  const dx=Math.abs(G.de.x-G.ds.x), dy=Math.abs(G.de.y-G.ds.y);
  if(dx<6&&dy<6) doSelect(ev.clientX,ev.clientY);
  else doDragSel();
});
canvas.addEventListener('contextmenu',ev=>{
  ev.preventDefault();
  if(G.bmode){G.bmode=null;updAct();return;}
  doCommand(ev.clientX,ev.clientY);
});

// ── Touch ─────────────────────────────────────────────
(function initCanvasTouch(){
  const active={};
  let panRef=null;

  canvas.addEventListener('touchstart',ev=>{
    ev.preventDefault();
    for(const t of ev.changedTouches){
      const id=t.identifier;
      active[id]={x:t.clientX,y:t.clientY,sx:t.clientX,sy:t.clientY,
                  t:Date.now(),moved:false,longPressed:false,longTimer:null};
      // Long-press (500ms) → command / place
      active[id].longTimer=setTimeout(()=>{
        if(!active[id]||active[id].moved) return;
        active[id].longPressed=true;
        tapRing(active[id].sx,active[id].sy,true);
        if(G.bmode) doPlace(active[id].sx,active[id].sy);
        else doCommand(active[id].sx,active[id].sy);
      },500);
    }
    if(Object.keys(active).length===1)
      panRef=ev.changedTouches[0].identifier;
  },{passive:false});

  canvas.addEventListener('touchmove',ev=>{
    ev.preventDefault();
    const cnt=ev.touches.length;
    for(const t of ev.changedTouches){
      const a=active[t.identifier]; if(!a) continue;
      const ddx=t.clientX-a.x, ddy=t.clientY-a.y;
      if(Math.abs(t.clientX-a.sx)>7||Math.abs(t.clientY-a.sy)>7){
        a.moved=true;
        clearTimeout(a.longTimer);
      }
      // Update ghost position while finger moves
      const w=screenToWorld(t.clientX,t.clientY);
      ghost.x=w.x; ghost.y=w.y;
      // Pan: single finger when not in build mode
      if(cnt===1&&!G.bmode&&!CMD_STATE.cmdMode&&t.identifier===panRef&&a.moved){
        G.cam.x=cl(G.cam.x-ddx,0,Math.max(0,G.MW-L.W));
        G.cam.y=cl(G.cam.y-ddy,0,Math.max(0,G.MH-L.gameH));
      }
      // Two-finger pan always works
      if(cnt===2&&a.moved){
        G.cam.x=cl(G.cam.x-ddx/2,0,Math.max(0,G.MW-L.W));
        G.cam.y=cl(G.cam.y-ddy/2,0,Math.max(0,G.MH-L.gameH));
      }
      a.x=t.clientX; a.y=t.clientY;
    }
  },{passive:false});

  canvas.addEventListener('touchend',ev=>{
    ev.preventDefault();
    for(const t of ev.changedTouches){
      const a=active[t.identifier];
      if(!a){delete active[t.identifier];continue;}
      clearTimeout(a.longTimer);
      const quick=Date.now()-a.t<450;
      if(quick&&!a.moved&&!a.longPressed){
        // Quick tap
        if(G.bmode){
          tapRing(a.sx,a.sy,false);
          doPlace(a.sx,a.sy);
        } else if(CMD_STATE.cmdMode){
          tapRing(a.sx,a.sy,true);
          doCommand(a.sx,a.sy);
          // exit CMD mode
          CMD_STATE.cmdMode=false;
          const btn=document.getElementById('cmdBtn');
          btn.classList.remove('active');
          btn.querySelector('.ci').textContent='⚔';
          btn.querySelector('.cl').textContent='CMD';
        } else {
          tapRing(a.sx,a.sy,false);
          doSelect(a.sx,a.sy);
        }
      }
      delete active[t.identifier];
      if(t.identifier===panRef) panRef=null;
    }
  },{passive:false});

  canvas.addEventListener('touchcancel',ev=>{
    for(const t of ev.changedTouches){
      clearTimeout((active[t.identifier]||{}).longTimer);
      delete active[t.identifier];
    }
    panRef=null;
  });
})();

// ── Tap ring helper ────────────────────────────────────
function tapRing(x,y,red=false){
  const r=document.createElement('div');
  r.className='tap-ring'+(red?' red':'');
  r.style.left=x+'px'; r.style.top=y+'px';
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),450);
}

// ── UI ────────────────────────────────────────────────
function updHUD(){
  document.getElementById('rFood').textContent=Math.floor(G.res.food);
  document.getElementById('rWood').textContent=Math.floor(G.res.wood);
  document.getElementById('rGold').textContent=Math.floor(G.res.gold);
  document.getElementById('rStone').textContent=Math.floor(G.res.stone);
  document.getElementById('rPop').textContent=G.pop;
  document.getElementById('rPopCap').textContent=G.popCap;
  const nums=['I','II','III','IV'];
  const lbls=['DARK','ARCHAIC','CLASSICAL','HEROIC'];
  document.getElementById('ageNum').textContent=nums[G.age]||'I';
  document.getElementById('ageLbl').textContent=lbls[G.age]||'';
  // Update game timer
  const el=Math.floor((Date.now()-G.startTime)/1000);
  const h=Math.floor(el/3600).toString().padStart(2,'0');
  const m=Math.floor((el%3600)/60).toString().padStart(2,'0');
  const s=(el%60).toString().padStart(2,'0');
  const t=document.getElementById('gameTimer');
  if(t)t.textContent=`${h}:${m}:${s}`;
}
function rIco(r){return{food:'🌾',wood:'🪵',gold:'⛏',stone:'🪨'}[r]||'';}
function uIco(t){return{villager:'👷',militia:'⚔',archer:'🏹',horseman:'🐴',catapult:'💣'}[t]||'?';}

function updSel(){
  const nm=document.getElementById('selName'),inf=document.getElementById('selInfo'),
        hw=document.getElementById('hpBarWrap'),hi=document.getElementById('hpInner'),
        pn=document.getElementById('portName'),
        own=document.getElementById('ownerName'),
        statHP=document.getElementById('statHP'),
        statAtk=document.getElementById('statAtk'),
        statRng=document.getElementById('statRng'),
        statSpd=document.getElementById('statSpd'),
        atkSec=document.getElementById('atkSection'),
        atkDmg=document.getElementById('atkDmg'),
        atkRng=document.getElementById('atkRng'),
        atkSpd=document.getElementById('atkSpd');
  drawPortrait(G.sel.length===1?G.sel[0]:null);
  if(!G.sel.length){
    nm.textContent='No Selection';inf.textContent='Click a unit or building to select.';
    if(hw)hw.style.display='none';if(pn)pn.textContent='— SELECT A UNIT —';
    if(own)own.textContent='';if(atkSec)atkSec.style.display='none';
    if(statHP)statHP.textContent='—';if(statAtk)statAtk.textContent='—';
    if(statRng)statRng.textContent='—';if(statSpd)statSpd.textContent='—';
  } else if(G.sel.length===1){
    const e=G.sel[0];
    nm.textContent=e.name;
    if(pn)pn.textContent=e.name.toUpperCase();
    if(own)own.textContent=e.enemy?'Enemy':'TheBradFad';
    const p=e.hp/e.mhp;
    if(statHP){statHP.textContent=`${Math.ceil(e.hp)}/${e.mhp}`;}
    if(statAtk){statAtk.textContent=e.dmg>0?e.dmg:'—';}
    if(statRng){statRng.textContent=e.rng>18?Math.round(e.rng/10)+'0m':'Melee';}
    if(statSpd){statSpd.textContent=e.spd?e.spd.toFixed(1):'—';}
    if(hw)hw.style.display='flex';
    if(hi){hi.style.width=(p*100)+'%';hi.style.background=p>.5?'#28a020':p>.25?'#c09020':'#cc2020';}
    if(atkSec&&!e.bld){
      atkSec.style.display='flex';
      if(atkDmg)atkDmg.textContent=e.dmg||0;
      if(atkRng)atkRng.textContent=e.rng||18;
      if(atkSpd)atkSpd.textContent=e.spd?e.spd.toFixed(1):'1.0';
    } else if(atkSec){atkSec.style.display='none';}
    let t='';
    if(e.bld&&e.tq&&e.tq.length)t+=`Training: ${UD[e.tq[0]]?.name||e.tq[0]}`;
    if(!e.bld&&e.task)t+=`Task: ${e.task.toUpperCase()}`;
    if(e.ca>0)t+=`\nCarrying: ${e.ca} ${e.cr}`;
    inf.textContent=t;
  } else {
    nm.textContent=G.sel.length+' Selected';
    inf.textContent=G.sel.map(e=>e.name).join(', ');
    if(hw)hw.style.display='none';
    if(pn)pn.textContent=G.sel.length+' UNITS';
    if(own)own.textContent='';if(atkSec)atkSec.style.display='none';
    if(statHP)statHP.textContent='—';if(statAtk)statAtk.textContent='—';
    if(statRng)statRng.textContent='—';if(statSpd)statSpd.textContent='—';
  }
  updAct();
}
function mkBtn(ico,name,cb,cost=''){
  const b=document.createElement('div');b.className='aBtn';
  const s=Math.max(40,L.btnSize||44);
  b.style.width=s+'px';b.style.height=s+'px';
  b.innerHTML=`<span class="aBtnIco">${ico}</span><span class="aBtnName">${name}</span>`;
  if(cost){const c=document.createElement('div');c.className='aCost';c.textContent=cost;b.appendChild(c);}
  b.title=name;
  b.addEventListener('click',cb);
  b.addEventListener('touchend',ev=>{ev.preventDefault();cb();},{passive:false});
  return b;
}
function updAct(){
  const p=document.getElementById('actPanel');
  // Clear only .aBtn children so the joystick div (if present) is preserved
  Array.from(p.querySelectorAll('.aBtn')).forEach(b=>b.remove());

  if(G.bmode){
    const b=mkBtn('✕','Cancel',()=>{G.bmode=null;updAct();});
    b.style.fontSize='18px';p.appendChild(b);return;
  }
  if(!G.sel.length)return;
  const e=G.sel[0];
  if(e.bld&&e.built&&!e.enemy){
    for(const ut of(e.trains||[])){
      const d=UD[ut];if(!d)continue;
      const cs=Object.entries(d.cost).map(([k,v])=>`${rIco(k)}${v}`).join(' ');
      const b=mkBtn(uIco(ut),d.name,()=>{if(!afford(d.cost)){notify('Not enough!');return;}if(G.pop>=G.popCap){notify('Population full!');return;}spend(d.cost);e.tq.push(ut);notify('Training '+d.name+'...');},cs);
      p.appendChild(b);
    }
    if(e.type==='tc'&&G.age<3){
      const cs=[{food:400,gold:300},{food:800,gold:600},{food:1600,gold:1200}][G.age];
      p.appendChild(mkBtn('⬆','Advance Age',()=>{if(!afford(cs)){notify('Not enough!');return;}spend(cs);G.age++;notify('🎉 '+G.ages[G.age]+'!');}));
    }
    return;
  }
  const isV=G.sel.some(e=>e.type==='villager'&&!e.enemy);
  if(isV){
    // Include TC in the build menu
    [['tc','🏰'],['house','🏠'],['farm','🌾'],['bks','⚔'],['range','🏹'],['stable','🐴'],['mine','⛏'],['tower','🗼'],['wall','🧱'],['siege','🔩']].forEach(([t,ic])=>{
      const d=BD[t],cs=Object.entries(d.cost).map(([k,v])=>`${rIco(k)}${v}`).join(' ')||'Free';
      p.appendChild(mkBtn(ic,d.name,()=>{G.bmode=t;notify('Place '+d.name+' – tap/click on the map');updAct();},cs));
    });
  }
  p.appendChild(mkBtn('✋','Stop',()=>{for(const e of G.sel){e.task=null;e.mtgt=null;e.tgt=null;}}));
}

// ── End screen ────────────────────────────────────────
function endScreen(){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.88);z-index:100;flex-direction:column;gap:22px;font-family:Cinzel,serif;';
  const msg=G.win?'⚔ VICTORY! ⚔':'💀 DEFEAT 💀',col=G.win?'#f0c040':'#cc2222';
  d.innerHTML=`<div style="color:${col};font-size:54px;text-shadow:0 0 30px ${col}">${msg}</div><div style="color:#d4b896;font-size:18px">${G.win?'The gods smile upon your civilization!':'Your people have perished.'}</div><button onclick="location.reload()" style="background:linear-gradient(135deg,#2a1600,#4a2800);border:2px solid #c8a840;color:#f0c040;font-family:Cinzel,serif;font-size:16px;padding:12px 32px;cursor:pointer;border-radius:4px;margin-top:12px;letter-spacing:1px">Play Again</button>`;
  document.body.appendChild(d);
}

// ── Game loop ─────────────────────────────────────────
function loop(){
  if(G.over)return;
  G.tick++;
  camUpdate();
  tickEnts();
  spawnWave();
  if(G.tick%4===0){pop();updHUD();}
  if(G.tick%14===0)updSel();
  G.sel=G.sel.filter(e=>!e.dead);
  render();
  renderMM();
  requestAnimationFrame(loop);
}

notify('⚔ Welcome to Age of Legends!');
notify('🌾 Villagers auto-gather resources & build');
notify('⚔ Attack enemies to start combat!');
if(IS_TOUCH){
  setTimeout(()=>notify('👆 Tap=select  Long-press=command'),1200);
  setTimeout(()=>notify('🕹 Joystick pans camera  ⚔ CMD=issue order'),2400);
}

layoutHUD(); // Now safe to call — G is defined
loop();

window.addEventListener('resize',()=>{ layoutHUD(); });
