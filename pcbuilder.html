<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>PC Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0b0e;--surface:#13151a;--surface2:#1c1f26;--surface3:#242830;
  --border:#2a2d36;--border2:#363a46;
  --accent:#00d4ff;--accent2:#0099cc;--accent3:#60ffcc;--accent4:#ff9030;--accent5:#c8f060;
  --text:#e8eaf0;--muted:#70737f;--danger:#ff4455;--ok:#30d090;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:clamp(12px,1.4vw,14px)}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* Subtle grid bg */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* ── BACK BAR ── */
.back-bar{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);background:rgba(10,11,14,.95);flex-shrink:0;position:relative;z-index:10;backdrop-filter:blur(8px)}
.back-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:.72rem;padding:5px 10px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;letter-spacing:-.01em;color:var(--text);flex:1}
.page-title span{color:var(--accent)}

/* ── TABS ── */
#main-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none;position:relative;z-index:10}
#main-tabs::-webkit-scrollbar{display:none}
.mtab{padding:10px 18px;font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:color .15s}
.mtab.active{color:var(--accent);border-bottom-color:var(--accent)}
.mtab:hover{color:var(--text)}

/* ── SCREENS ── */
#app-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:1}
.screen{display:none;padding:14px;padding-bottom:80px;animation:fadeIn .18s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.card-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface2)}
.card-hdr-title{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);flex:1}
.card-hdr-badge{font-size:.65rem;padding:2px 8px;border-radius:20px;background:var(--surface3);border:1px solid var(--border2);color:var(--accent)}

/* ── BUILD SELECTOR ── */
#build-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
#build-tabs::-webkit-scrollbar{display:none}
.btab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Mono',monospace;font-size:.72rem;cursor:pointer;white-space:nowrap}
.btab.active{background:#001a22;border-color:var(--accent);color:var(--accent)}
.btab-add{color:var(--accent3);border-color:var(--accent3)}
.btab-add:hover{background:#001a10}

/* ── COMPONENT SLOT ── */
.comp-slot{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative}
.comp-slot:last-child{border-bottom:none}
.comp-slot:hover{background:var(--surface2)}
.comp-slot.filled:hover{background:#0a1620}
.comp-icon{font-size:1.2rem;flex-shrink:0;width:28px;text-align:center}
.comp-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px}
.comp-name{font-size:.85rem;color:var(--text);line-height:1.2}
.comp-name.empty{color:var(--muted);font-style:italic}
.comp-price{font-family:'Fraunces',serif;font-size:.9rem;font-weight:200;color:var(--accent);margin-left:auto;flex-shrink:0;white-space:nowrap}
.comp-actions{display:flex;gap:4px;margin-left:6px;flex-shrink:0}
.comp-act-btn{background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--muted);font-size:.65rem;padding:3px 7px;cursor:pointer;white-space:nowrap}
.comp-act-btn:hover{border-color:var(--accent);color:var(--accent)}
.comp-act-btn.del:hover{border-color:var(--danger);color:var(--danger)}

/* ── TOTAL BAR ── */
.total-bar{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.total-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);flex:1}
.total-amt{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:200;color:var(--accent);line-height:1}
.total-count{font-size:.68rem;color:var(--muted)}
.budget-bar-wrap{margin-top:8px;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.budget-bar{height:100%;border-radius:2px;transition:width .4s ease,background .3s}

/* ── PART PICKER MODAL ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:flex-end;backdrop-filter:blur(4px)}
.modal-ov.active{display:flex}
@media(min-width:620px){.modal-ov{align-items:center;justify-content:center}}
.modal{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--accent);border-radius:12px 12px 0 0;width:100%;animation:slideUp .22s ease;max-height:88dvh;overflow:hidden;display:flex;flex-direction:column}
@media(min-width:620px){.modal{border-radius:12px;max-width:520px;max-height:82dvh}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface2)}
.modal-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--accent);flex:1;letter-spacing:-.01em}
.modal-close{background:transparent;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:2px 6px}
.modal-close:hover{color:var(--text)}
.modal-search{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;outline:none}
.search-inp:focus{border-color:var(--accent)}
.search-inp::placeholder{color:var(--muted)}
.modal-body{flex:1;overflow-y:auto;padding:8px}
.part-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:border-color .12s,background .12s}
.part-item:hover{border-color:var(--accent);background:#00111a}
.part-item-icon{font-size:1.3rem;flex-shrink:0}
.part-item-info{flex:1;min-width:0}
.part-item-name{font-size:.82rem;color:var(--text);line-height:1.3;font-weight:500}
.part-item-specs{font-size:.65rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.part-item-price{font-family:'Fraunces',serif;font-size:1rem;font-weight:200;color:var(--accent);flex-shrink:0}
.part-item-wish{background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--muted);font-size:.65rem;padding:3px 7px;cursor:pointer;flex-shrink:0;margin-left:4px}
.part-item-wish:hover{border-color:var(--accent3);color:var(--accent3)}
.part-item-wish.wished{background:#001a10;border-color:var(--accent3);color:var(--accent3)}
.add-custom-btn{width:100%;background:transparent;border:1px dashed var(--border);border-radius:8px;padding:10px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.78rem;cursor:pointer;text-align:center;margin-top:4px}
.add-custom-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Add custom form */
.custom-form{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;display:none}
.custom-form.open{display:block}
.cf-row{display:flex;gap:7px;margin-bottom:7px}
.cf-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:.78rem;outline:none;min-width:0}
.cf-inp:focus{border-color:var(--accent)}
.cf-inp::placeholder{color:var(--muted)}
.cf-btn{background:var(--accent);color:#000;border:none;border-radius:6px;padding:7px 14px;font-family:'DM Mono',monospace;font-size:.78rem;font-weight:500;cursor:pointer;white-space:nowrap}

/* ── COMPARE ── */
.compare-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:600px){.compare-grid{grid-template-columns:repeat(3,1fr)}}
.compare-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.compare-card:hover{border-color:var(--border2)}
.compare-card.sel{border-color:var(--accent);background:#001a22}
.compare-card-hdr{padding:10px 12px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:6px}
.compare-card-name{font-size:.82rem;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.compare-card-pts{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:200;color:var(--accent)}
.compare-spec-row{display:flex;align-items:center;padding:7px 12px;border-bottom:1px solid var(--border);font-size:.72rem}
.compare-spec-row:last-child{border-bottom:none}
.compare-spec-lbl{color:var(--muted);flex:1;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em}
.compare-spec-val{color:var(--text)}

/* ── WISHLIST ── */
.wish-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.wish-item:last-child{border-bottom:none}
.wish-cat{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);width:60px;flex-shrink:0}
.wish-name{flex:1;font-size:.82rem;color:var(--text)}
.wish-price{font-family:'Fraunces',serif;font-size:.9rem;font-weight:200;color:var(--accent);flex-shrink:0}
.wish-del{background:transparent;border:none;color:var(--border2);font-size:.9rem;cursor:pointer;padding:0 4px;flex-shrink:0}
.wish-del:hover{color:var(--danger)}
.wish-add-btn{background:transparent;border:none;color:var(--muted);font-size:.72rem;cursor:pointer;padding:0 4px;flex-shrink:0;text-decoration:underline}
.wish-add-btn:hover{color:var(--accent)}

/* ── BUILD NAME MODAL ── */
.mi{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:.82rem;width:100%;outline:none;margin-bottom:8px}
.mi:focus{border-color:var(--accent)}
.mi::placeholder{color:var(--muted)}
.mact{display:flex;gap:8px;margin-top:4px}
.mprim{flex:1;background:var(--accent);color:#000;border:none;border-radius:7px;padding:10px;font-family:'DM Mono',monospace;font-size:.8rem;font-weight:500;cursor:pointer}
.msec{flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:10px;font-family:'DM Mono',monospace;font-size:.8rem;cursor:pointer}

/* ── COMPAT WARNING ── */
.compat-warn{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1a0f00;border:1px solid var(--accent4);border-radius:7px;margin-bottom:10px;font-size:.72rem;color:var(--accent4)}
</style>
</head>
<body>

<div class="back-bar">
  <a class="back-btn" href="index.html">← Back</a>
  <div class="page-title"><span>PC</span> Builder</div>
</div>

<div id="main-tabs">
  <div class="mtab active" onclick="showTab('builder')">Builder</div>
  <div class="mtab" onclick="showTab('wishlist')">Wishlist</div>
  <div class="mtab" onclick="showTab('compare')">Compare</div>
</div>

<div id="app-body">
  <div class="screen active" id="s-builder"></div>
  <div class="screen" id="s-wishlist"></div>
  <div class="screen" id="s-compare"></div>
</div>

<!-- Part Picker Modal -->
<div class="modal-ov" id="picker-modal">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="picker-title">Select Component</span>
      <button class="modal-close" onclick="closePicker()">✕</button>
    </div>
    <div class="modal-search">
      <input class="search-inp" id="picker-search" placeholder="Search components…" oninput="filterParts()" />
    </div>
    <div class="modal-body" id="picker-body"></div>
    <div class="custom-form" id="custom-form">
      <div class="cf-row">
        <input class="cf-inp" id="cf-name" placeholder="Component name…" />
        <input class="cf-inp" id="cf-price" placeholder="$0" style="width:80px;flex:none" type="number" min="0" />
      </div>
      <div class="cf-row">
        <input class="cf-inp" id="cf-specs" placeholder="Specs / notes…" />
        <button class="cf-btn" onclick="addCustomPart()">Add</button>
      </div>
    </div>
  </div>
</div>

<!-- New Build Modal -->
<div class="modal-ov" id="build-modal">
  <div class="modal" style="border-radius:12px 12px 0 0;max-height:auto">
    <div class="modal-hdr">
      <span class="modal-title">New Build</span>
      <button class="modal-close" onclick="closeBuildModal()">✕</button>
    </div>
    <div style="padding:14px 16px">
      <input class="mi" id="bm-name" placeholder="Build name (e.g. Gaming Rig 2025)" />
      <input class="mi" id="bm-budget" placeholder="Budget (e.g. 2000) — optional" type="number" min="0" />
      <div class="mact">
        <button class="msec" onclick="closeBuildModal()">Cancel</button>
        <button class="mprim" onclick="createBuild()">Create</button>
      </div>
    </div>
  </div>
</div>

let state = load() || {
  builds: [{id:'b1', name:'My Build', budget:2000, components:{}}],
  curBuild: 'b1',
  wishlist: [],
  nextId: 10,
};

let curTab = 'builder';
let pickerSlotKey = null;
let pickerSearch = '';

// ── Helpers ──
function curBuild(){ return state.builds.find(b=>b.id===state.curBuild) || state.builds[0]; }
function buildTotal(b){ return Object.values(b.components||{}).reduce((s,c)=>s+(c?.price||0),0); }
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── Tabs ──
function showTab(id){
  curTab=id;
  document.querySelectorAll('.mtab').forEach((t,i)=>t.classList.toggle('active',['builder','wishlist','compare'][i]===id));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  render();
}

function render(){
  if(curTab==='builder') renderBuilder();
  else if(curTab==='wishlist') renderWishlist();
  else if(curTab==='compare') renderCompare();
}

// ════════════════════════════════════════
// BUILDER
// ════════════════════════════════════════
function renderBuilder(){
  const el = document.getElementById('s-builder');
  const b = curBuild();
  const total = buildTotal(b);
  const filled = SLOT_DEFS.filter(s=>b.components[s.key]).length;
  const budgetPct = b.budget ? Math.min(100, (total/b.budget)*100) : 0;
  const budgetColor = budgetPct > 100 ? 'var(--danger)' : budgetPct > 85 ? 'var(--accent4)' : 'var(--ok)';

  // Build tabs
  const buildTabsHtml = state.builds.map(build=>`
    <div class="btab ${build.id===state.curBuild?'active':''}" onclick="selectBuild('${build.id}')">${escH(build.name)}</div>
  `).join('') + `<div class="btab btab-add" onclick="openBuildModal()">+ New</div>`;

  // Compatibility checks
  const warns = checkCompat(b);
  const warnHtml = warns.map(w=>`<div class="compat-warn">⚠ ${w}</div>`).join('');

  // Component slots
  const slotsHtml = SLOT_DEFS.map(s=>{
    const c = b.components[s.key];
    return `<div class="comp-slot ${c?'filled':''}" onclick="openPicker('${s.key}')">
      <div class="comp-icon">${s.icon}</div>
      <div style="flex:1;min-width:0">
        <div class="comp-label">${s.label}</div>
        <div class="comp-name ${c?'':'empty'}">${c ? escH(c.name) : 'Click to select…'}</div>
        ${c?.specs ? `<div style="font-size:.62rem;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(c.specs)}</div>` : ''}
      </div>
      ${c ? `<div class="comp-price">$${c.price?.toLocaleString()||0}</div>
        <div class="comp-actions">
          <button class="comp-act-btn del" onclick="event.stopPropagation();removeComponent('${s.key}')">✕</button>
        </div>` : `<div style="font-size:.7rem;color:var(--border2)">＋</div>`}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div id="build-tabs">${buildTabsHtml}</div>

    <div class="total-bar">
      <div>
        <div class="total-lbl">Build Total · ${filled}/${SLOT_DEFS.length} slots filled</div>
        ${b.budget ? `<div style="font-size:.65rem;color:var(--muted);margin-top:2px">Budget: $${b.budget.toLocaleString()}</div>` : ''}
      </div>
      <div style="text-align:right">
        <div class="total-amt">$${total.toLocaleString()}</div>
        ${b.budget ? `<div class="total-count" style="color:${budgetColor}">${budgetPct.toFixed(0)}% of budget</div>` : ''}
      </div>
    </div>
    ${b.budget ? `<div class="budget-bar-wrap"><div class="budget-bar" style="width:${budgetPct}%;background:${budgetColor}"></div></div><div style="height:10px"></div>` : ''}

    ${warnHtml}

    <div class="card">
      <div class="card-hdr">
        <span class="card-hdr-title">${escH(b.name)}</span>
        <button onclick="deleteBuild('${b.id}')" style="background:transparent;border:none;color:var(--muted);font-size:.7rem;cursor:pointer;padding:2px 6px" title="Delete build">🗑</button>
      </div>
      ${slotsHtml}
    </div>
  `;
}

function checkCompat(b){
  const warns = [];
  const cpu = b.components.cpu?.name||'';
  const mobo = b.components.mobo?.name||'';
  if(cpu && mobo){
    const am5cpu = /AM5|Ryzen.*9[0-9]{2}|9[0-9]{3}X/.test(cpu);
    const am5board = /X870|B850|X670|B650|AM5/.test(mobo);
    const lga1851cpu = /LGA1851|Core Ultra.*[0-9]K|285K|265K|245K/.test(cpu);
    const lga1851board = /Z890|B860|H870|Z790|LGA1851/.test(mobo);
    const lga1700cpu = /LGA1700|Core i[0-9]-1[2-4]/.test(cpu);
    const lga1700board = /Z790|B760|H770|H610|LGA1700/.test(mobo);
    if((am5cpu && !am5board && !lga1700board)||(am5board && !am5cpu && cpu))
      warns.push('CPU/Motherboard socket mismatch — check AM5 compatibility');
    if((lga1851cpu && !lga1851board && mobo)||(lga1851board && !lga1851cpu && cpu))
      warns.push('CPU/Motherboard socket mismatch — check LGA1851 compatibility');
  }
  const psu = b.components.psu;
  const gpu = b.components.gpu;
  if(psu && gpu){
    const psuW = parseInt(psu.name.match(/(\d{3,4})W/)?.[1]||0);
    const gpuTdp = parseInt(gpu.specs?.match(/(\d{2,3})W TDP/)?.[1]||0);
    if(psuW && gpuTdp && psuW < gpuTdp+150)
      warns.push(`PSU may be underpowered — GPU needs ~${gpuTdp+150}W recommended`);
  }
  return warns;
}

function selectBuild(id){state.curBuild=id;save();renderBuilder();}

function removeComponent(key){
  const b=curBuild();
  delete b.components[key];
  save();renderBuilder();
}

function deleteBuild(id){
  if(state.builds.length<=1){alert('Need at least one build');return;}
  if(!confirm('Delete this build?'))return;
  state.builds=state.builds.filter(b=>b.id!==id);
  state.curBuild=state.builds[0].id;
  save();render();
}

// ── Build modal ──
function openBuildModal(){
  document.getElementById('bm-name').value='';
  document.getElementById('bm-budget').value='';
  document.getElementById('build-modal').classList.add('active');
  setTimeout(()=>document.getElementById('bm-name').focus(),100);
}
function closeBuildModal(){document.getElementById('build-modal').classList.remove('active');}
document.getElementById('build-modal').onclick=e=>{if(e.target===document.getElementById('build-modal'))closeBuildModal();}
document.getElementById('bm-name').onkeydown=e=>{if(e.key==='Enter')createBuild();}

function createBuild(){
  const name=document.getElementById('bm-name').value.trim();
  if(!name)return;
  const budget=parseFloat(document.getElementById('bm-budget').value)||0;
  const b={id:'b'+(state.nextId++),name,budget,components:{}};
  state.builds.push(b);
  state.curBuild=b.id;
  save();closeBuildModal();renderBuilder();
}

// ════════════════════════════════════════
// PART PICKER
// ════════════════════════════════════════
function openPicker(key){
  pickerSlotKey=key;
  pickerSearch='';
  const def=SLOT_DEFS.find(s=>s.key===key);
  document.getElementById('picker-title').textContent=`${def.icon} Select ${def.label}`;
  document.getElementById('picker-search').value='';
  document.getElementById('custom-form').classList.remove('open');
  document.getElementById('picker-modal').classList.add('active');
  filterParts();
}
function closePicker(){document.getElementById('picker-modal').classList.remove('active');}
document.getElementById('picker-modal').onclick=e=>{if(e.target===document.getElementById('picker-modal'))closePicker();}

function filterParts(){
  const q=(document.getElementById('picker-search').value||'').toLowerCase();
  const cats=CATALOG[pickerSlotKey]||[];
  // also show all custom parts for this slot
  const b=curBuild();
  const customParts=(state.customParts||[]).filter(p=>p.slot===pickerSlotKey);
  const allParts=[...cats,...customParts];
  const filtered=q?allParts.filter(p=>p.name.toLowerCase().includes(q)||p.specs?.toLowerCase().includes(q)):allParts;

  const wished=new Set((state.wishlist||[]).map(w=>w.name));
  const body=document.getElementById('picker-body');
  body.innerHTML=filtered.map(p=>`
    <div class="part-item" onclick="selectPart(${JSON.stringify(JSON.stringify(p))})">
      <span class="part-item-icon">${p.icon||'📦'}</span>
      <div class="part-item-info">
        <div class="part-item-name">${escH(p.name)}</div>
        ${p.specs?`<div class="part-item-specs">${escH(p.specs)}</div>`:''}
      </div>
      <div class="part-item-price">$${(p.price||0).toLocaleString()}</div>
      <button class="part-item-wish ${wished.has(p.name)?'wished':''}" onclick="event.stopPropagation();toggleWish(${JSON.stringify(JSON.stringify(p))})" title="Add to wishlist">♡</button>
    </div>
  `).join('') + `<button class="add-custom-btn" onclick="toggleCustomForm()">+ Add custom component</button>`;
}

function selectPart(jsonStr){
  const p=JSON.parse(jsonStr);
  const b=curBuild();
  b.components[pickerSlotKey]={...p};
  save();closePicker();renderBuilder();
}

function toggleCustomForm(){
  const f=document.getElementById('custom-form');
  f.classList.toggle('open');
  if(f.classList.contains('open'))document.getElementById('cf-name').focus();
}

function addCustomPart(){
  const name=document.getElementById('cf-name').value.trim();
  if(!name)return;
  const price=parseFloat(document.getElementById('cf-price').value)||0;
  const specs=document.getElementById('cf-specs').value.trim();
  const def=SLOT_DEFS.find(s=>s.key===pickerSlotKey);
  const p={name,price,specs,icon:def?.icon||'📦',slot:pickerSlotKey,custom:true};
  if(!state.customParts)state.customParts=[];
  state.customParts.push(p);
  save();selectPart(JSON.stringify(p));
}

// ════════════════════════════════════════
// WISHLIST
// ════════════════════════════════════════
function toggleWish(jsonStr){
  const p=JSON.parse(jsonStr);
  if(!state.wishlist)state.wishlist=[];
  const idx=state.wishlist.findIndex(w=>w.name===p.name);
  if(idx>=0) state.wishlist.splice(idx,1);
  else state.wishlist.push({...p});
  save();filterParts();
}

function renderWishlist(){
  const el=document.getElementById('s-wishlist');
  const wish=state.wishlist||[];
  if(!wish.length){
    el.innerHTML='<div style="text-align:center;padding:40px 16px;color:var(--muted)"><div style="font-size:32px;margin-bottom:10px">♡</div><p style="font-size:.82rem;line-height:1.7">Your wishlist is empty.<br>Browse components in Builder and ♡ anything you want to track.</p></div>';
    return;
  }
  const total=wish.reduce((s,w)=>s+(w.price||0),0);
  // Group by slot
  const bySlot={};
  wish.forEach(w=>{const slot=w.slot||'other';if(!bySlot[slot])bySlot[slot]=[];bySlot[slot].push(w);});

  el.innerHTML=`
    <div class="total-bar" style="margin-bottom:12px">
      <div class="total-lbl">Wishlist · ${wish.length} items</div>
      <div class="total-amt">$${total.toLocaleString()}</div>
    </div>
    <div class="card">
      ${Object.entries(bySlot).map(([slot,items])=>{
        const def=SLOT_DEFS.find(s=>s.key===slot)||{label:slot,icon:'📦'};
        return items.map(w=>`
          <div class="wish-item">
            <span style="font-size:1rem;flex-shrink:0">${w.icon||def.icon}</span>
            <span class="wish-cat">${def.label}</span>
            <span class="wish-name">${escH(w.name)}</span>
            <span class="wish-price">$${(w.price||0).toLocaleString()}</span>
            <button class="wish-add-btn" onclick="addWishToBuild(${JSON.stringify(JSON.stringify(w))})">+ Build</button>
            <button class="wish-del" onclick="removeWish('${escH(w.name)}')">×</button>
          </div>`).join('');
      }).join('')}
    </div>
  `;
}

function removeWish(name){
  state.wishlist=(state.wishlist||[]).filter(w=>w.name!==name);
  save();renderWishlist();
}

function addWishToBuild(jsonStr){
  const p=JSON.parse(jsonStr);
  const b=curBuild();
  const slot=p.slot||'other';
  b.components[slot]={...p};
  save();
  alert(`Added "${p.name}" to ${b.name}`);
}

// ════════════════════════════════════════
// COMPARE
// ════════════════════════════════════════
let compareSelected=new Set();

function renderCompare(){
  const el=document.getElementById('s-compare');
  if(state.builds.length<2){
    el.innerHTML='<div style="text-align:center;padding:40px 16px;color:var(--muted)"><div style="font-size:32px;margin-bottom:10px">⚖</div><p style="font-size:.82rem;line-height:1.7">Create at least 2 builds in Builder to compare them side-by-side.</p></div>';
    return;
  }

  const sel=state.builds.filter(b=>compareSelected.has(b.id));
  const compHtml=sel.length>=2?renderCompareTable(sel):'<div style="color:var(--muted);font-size:.78rem;text-align:center;padding:16px">Select 2 or more builds above to compare</div>';

  el.innerHTML=`
    <div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px">Select builds to compare</div>
    <div class="compare-grid" style="margin-bottom:16px">
      ${state.builds.map(b=>{
        const total=buildTotal(b);
        const isSel=compareSelected.has(b.id);
        return `<div class="compare-card ${isSel?'sel':''}" onclick="toggleCompare('${b.id}')">
          <div class="compare-card-hdr">
            <span class="compare-card-name">${escH(b.name)}</span>
            ${isSel?'<span style="color:var(--accent);font-size:.8rem">✓</span>':''}
          </div>
          <div class="compare-spec-row"><span class="compare-spec-lbl">Total</span><span class="compare-spec-val" style="color:var(--accent)">$${total.toLocaleString()}</span></div>
          <div class="compare-spec-row"><span class="compare-spec-lbl">Budget</span><span class="compare-spec-val">${b.budget?'$'+b.budget.toLocaleString():'—'}</span></div>
          <div class="compare-spec-row"><span class="compare-spec-lbl">Parts</span><span class="compare-spec-val">${Object.keys(b.components||{}).length}/${SLOT_DEFS.length}</span></div>
        </div>`;
      }).join('')}
    </div>
    ${compHtml}
  `;
}

function toggleCompare(id){
  if(compareSelected.has(id))compareSelected.delete(id);
  else compareSelected.add(id);
  renderCompare();
}

function renderCompareTable(builds){
  const rows=SLOT_DEFS.map(s=>{
    const vals=builds.map(b=>{
      const c=b.components[s.key];
      return c?`<td style="padding:8px 10px;font-size:.75rem;border-right:1px solid var(--border);vertical-align:top;max-width:140px"><div style="font-weight:500;color:var(--text);margin-bottom:2px;line-height:1.3">${escH(c.name)}</div>${c.price?`<div style="color:var(--accent);font-size:.68rem">$${c.price.toLocaleString()}</div>`:''}${c.specs?`<div style="color:var(--muted);font-size:.62rem;margin-top:2px;line-height:1.4">${escH(c.specs)}</div>`:''}</td>`
        :`<td style="padding:8px 10px;color:var(--muted);font-size:.72rem;border-right:1px solid var(--border)">—</td>`;
    }).join('');
    return `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:8px 10px;font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-right:1px solid var(--border);white-space:nowrap;background:var(--surface2)">${s.icon} ${s.label}</td>
      ${vals}
    </tr>`;
  }).join('');

  const totals=builds.map(b=>`<td style="padding:10px;text-align:center;border-right:1px solid var(--border)"><div style="font-family:'Fraunces',serif;font-size:1.3rem;font-weight:200;color:var(--accent)">$${buildTotal(b).toLocaleString()}</div></td>`).join('');

  return `<div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden">
      <thead>
        <tr style="border-bottom:2px solid var(--border)">
          <th style="padding:10px;text-align:left;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);background:var(--surface2);border-right:1px solid var(--border)">Part</th>
          ${builds.map(b=>`<th style="padding:10px;text-align:left;font-size:.75rem;color:var(--accent);background:var(--surface2);border-right:1px solid var(--border)">${escH(b.name)}</th>`).join('')}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr style="border-top:2px solid var(--border);background:var(--surface2)">
          <td style="padding:10px;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);border-right:1px solid var(--border)">TOTAL</td>
          ${totals}
        </tr>
      </tfoot>
    </table>
  </div>`;
}

// ── Init ──
render();
